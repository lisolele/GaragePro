<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Pro iOS</title>

<style>
body{
    margin:0;
    font-family:-apple-system, sans-serif;
    background:#f2f2f7;
}

header{
    padding:16px;
    text-align:center;
    background:white;
    position:sticky;
    top:0;
    font-weight:600;
}

.container{padding:12px; max-width:900px; margin:auto;}

.section{
    background:white;
    padding:12px;
    margin-top:12px;
    border-radius:12px;
}

input,select,button{
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    background:#007aff;
    color:white;
    border:none;
}

.shelf{
    background:#f5f5f7;
    padding:10px;
    border-radius:12px;
    margin-top:10px;
}

.level{
    background:white;
    margin-top:6px;
    padding:8px;
    border-radius:8px;
    border:1px dashed #ccc;
}

</style>
</head>

<body>

<header>🚗 Garage Pro iOS</header>

<div class="container">

<div class="section">
<h3>Crea scaffale</h3>

<input id="shelfName" placeholder="Nome scaffale">
<input id="levels" type="number" placeholder="Numero ripiani" value="1">
<button onclick="aggiungiScaffale()">Crea</button>
</div>

<div id="shelfView"></div>

</div>

<script>

let scaffali = JSON.parse(localStorage.getItem("scaffali")) || [];

// SALVA
function save(){
    localStorage.setItem("scaffali", JSON.stringify(scaffali));
}

// CREA SCAFFALE (FIX DEFINITIVO)
function aggiungiScaffale(){

    const nameInput = document.getElementById("shelfName");
    const levelInput = document.getElementById("levels");

    const nome = nameInput.value.trim();
    const livelli = parseInt(levelInput.value || "1");

    if(!nome){
        alert("Inserisci nome scaffale");
        return;
    }

    scaffali.push({
        nome,
        livelli
    });

    save();
    render();
    nameInput.value = "";
    levelInput.value = "";
}

// RENDER
function render(){

    const container = document.getElementById("shelfView");
    container.innerHTML = "";

    scaffali.forEach((s,i)=>{

        const div = document.createElement("div");
        div.className = "shelf";

        div.innerHTML = `<b>${s.nome}</b>`;

        for(let j=0;j<s.livelli;j++){
            const lvl = document.createElement("div");
            lvl.className = "level";
            lvl.innerText = "Ripiano " + (j+1);
            div.appendChild(lvl);
        }

        container.appendChild(div);
    });
}

// INIT
render();

</script>

</body>
</html>
