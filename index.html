<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Pro</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f2f2f7;
}

header{
position:sticky;
top:0;
background:#fff;
border-bottom:1px solid #eee;
z-index:10;
}

.headerBar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 12px;
}

.title{font-weight:700;font-size:15px}

.undoRedo{
display:flex;
gap:6px;
}

.undoRedo button{
width:28px;
height:28px;
border:none;
border-radius:8px;
background:#1c1c1e;
color:#fff;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
}

/* layout */
.container{
padding:12px;
max-width:900px;
margin:auto;
}

.section{
background:#fff;
padding:14px;
border-radius:14px;
margin-top:12px;
box-shadow:0 4px 14px rgba(0,0,0,0.04);
}

h3{margin:0 0 10px 0;font-size:14px}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:10px;
border:1px solid #ddd;
font-size:13px;
}

button{
background:#007aff;
color:#fff;
border:none;
font-weight:600;
}

/* SCAFFALI */
.shelfCard{
margin-top:10px;
padding:10px;
border:1px solid #eee;
border-radius:12px;
}

.levelRow{
display:flex;
gap:6px;
align-items:center;
margin-top:6px;
}

.levelRow input{
flex:1;
border:none;
background:#f5f5f5;
padding:6px;
border-radius:8px;
font-size:12px;
}

.smallBtn{
width:26px;
height:26px;
border:none;
border-radius:8px;
font-size:11px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.smallBtn.danger{background:#ff3b30;color:#fff}
.smallBtn.blue{background:#007aff;color:#fff}

/* ITEMS */
.itemCard{
display:flex;
gap:10px;
align-items:center;
padding:10px;
border-radius:12px;
border:1px solid #eee;
margin-top:10px;
background:#fff;
}

.itemImg{
width:48px;
height:48px;
background:#eee;
border-radius:10px;
}

.itemInfo{flex:1}

.itemTitle{font-weight:600;font-size:13px}

.itemMeta{
font-size:11px;
opacity:.7;
margin-top:3px;
}
</style>
</head>

<body>

<header>
<div class="headerBar">
<div class="title">🚗 Garage Pro</div>

<div class="undoRedo">
<button onclick="undo()">↩</button>
<button onclick="redo()">↪</button>
<button onclick="printReport()">📄</button>
</div>
</div>
</header>

<div class="container">

<div class="section">
<h3>Scaffali</h3>
<input id="shelfName" placeholder="Nome scaffale">
<button onclick="addShelf()">Crea</button>
<div id="shelfView"></div>
</div>

<div class="section">
<h3>Oggetti</h3>

<input id="search" placeholder="Cerca..." oninput="renderItems()">

<input id="nome" placeholder="Nome">
<input id="categoria" placeholder="Categoria">

<select id="selectShelf"></select>
<select id="selectLevel"></select>

<button onclick="addItem()">Salva</button>
</div>

<div class="section">
<h3>Lista</h3>
<div id="items"></div>
</div>

</div>

<script>

/* ===== STATE ===== */
let inventario = JSON.parse(localStorage.getItem("inv"))||[];
let scaffali = JSON.parse(localStorage.getItem("shel"))||[];

let undoStack=[], redoStack=[];

const $=id=>document.getElementById(id);

function save(){
localStorage.setItem("inv",JSON.stringify(inventario));
localStorage.setItem("shel",JSON.stringify(scaffali));
}

function saveState(){
undoStack.push(JSON.stringify({inventario,scaffali}));
redoStack=[];
}

/* ===== UNDO REDO ===== */
function undo(){
if(!undoStack.length) return;
redoStack.push(JSON.stringify({inventario,scaffali}));
let s=JSON.parse(undoStack.pop());
inventario=s.inventario;
scaffali=s.scaffali;
save();
render();
}

function redo(){
if(!redoStack.length) return;
undoStack.push(JSON.stringify({inventario,scaffali}));
let s=JSON.parse(redoStack.pop());
inventario=s.inventario;
scaffali=s.scaffali;
save();
render();
}

/* ===== SCAFFALI ===== */
function addShelf(){
let n=$("shelfName").value.trim();
if(!n) return;

saveState();

scaffali.push({
nome:n,
livelli:[{nome:"Ripiano 1"}]
});

$("shelfName").value="";
render();
}

function addLevel(i){
saveState();
scaffali[i].livelli.push({nome:`Ripiano ${scaffali[i].livelli.length+1}`});
render();
}

function deleteLevel(i,l){
saveState();

scaffali[i].livelli.splice(l,1);

inventario = inventario.filter(o=>{
if(o.shelf!=i) return true;
if(o.level==l) return false;
if(o.level>l) o.level--;
return true;
});

render();
}

function renameLevel(i,l,val){
scaffali[i].livelli[l].nome = val;
save();
}

/* ===== ITEMS ===== */
function addItem(){

let nome=$("nome").value.trim();
if(!nome) return;

saveState();

inventario.push({
id:Date.now(),
nome,
categoria:$("categoria").value,
shelf:Number($("selectShelf").value||0),
level:Number($("selectLevel").value||0)
});

$("nome").value="";
$("categoria").value="";

render();
}

/* ===== RENDER ===== */
function renderShelf(){

let c=$("shelfView");
c.innerHTML="";

scaffali.forEach((s,i)=>{

let div=document.createElement("div");
div.className="shelfCard";

div.innerHTML=`
<strong>${s.nome}</strong>
<button class="smallBtn blue" onclick="addLevel(${i})">+</button>
`;

(s.livelli||[]).forEach((l,idx)=>{
div.innerHTML+=`
<div class="levelRow">
<input value="${l.nome}"
oninput="renameLevel(${i},${idx},this.value)">
<button class="smallBtn danger" onclick="deleteLevel(${i},${idx})">×</button>
</div>
`;
});

c.appendChild(div);
});
}

function renderItems(){

let c=$("items");
c.innerHTML="";

let q=$("search").value.toLowerCase();

inventario.forEach(i=>{

if(q && !i.nome.toLowerCase().includes(q) && !(i.categoria||"").toLowerCase().includes(q))
return;

let shelf=scaffali[i.shelf]?.nome||"-";
let level=scaffali[i.shelf]?.livelli?.[i.level]?.nome||"Ripiano";

let d=document.createElement("div");
d.className="itemCard";

d.innerHTML=`
<div class="itemImg"></div>

<div class="itemInfo">
<div class="itemTitle">${i.nome}</div>
<div class="itemMeta">${i.categoria||"-"} • ${shelf} • ${level}</div>
</div>
`;

c.appendChild(d);
});
}

function updateSelectors(){

let s=$("selectShelf");
s.innerHTML="";

scaffali.forEach((sh,i)=>{
s.innerHTML+=`<option value="${i}">${sh.nome}</option>`;
});

updateLevels();
}

function updateLevels(){

let i=Number($("selectShelf").value);
let l=$("selectLevel");

l.innerHTML="";

if(!scaffali[i]) return;

scaffali[i].livelli.forEach((lv,idx)=>{
l.innerHTML+=`<option value="${idx}">${lv.nome}</option>`;
});
}

$("selectShelf").onchange=updateLevels;

/* ===== REPORT A4 PRINT ===== */
function printReport(){

const win = window.open("", "_blank");

let html = `
<html>
<head>
<title>Report Garage</title>

<style>
@page { size: A4; margin: 18mm; }

body{
font-family: Arial;
color:#111;
}

h1{font-size:18px;margin-bottom:10px}

.shelf{
margin-top:12px;
font-weight:bold;
border-bottom:1px solid #000;
padding-bottom:4px;
}

.item{
display:flex;
justify-content:space-between;
font-size:12px;
padding:4px 0;
border-bottom:1px dotted #ccc;
}

.small{font-size:11px;opacity:.7}
</style>
</head>

<body>

<h1>📦 Report Inventario Garage</h1>
<div class="small">Generato: ${new Date().toLocaleString()}</div>
`;

scaffali.forEach((s,i)=>{

html += `<div class="shelf">🗄 ${s.nome}</div>`;

(s.livelli||[]).forEach((l,idx)=>{

html += `<div class="small">▶ ${l.nome}</div>`;

inventario
.filter(it=>it.shelf===i && it.level===idx)
.forEach(it=>{
html += `
<div class="item">
<b>${it.nome}</b>
<span class="small">${it.categoria||"-"}</span>
</div>
`;
});

});

});

html += `
</body>
</html>
`;

win.document.write(html);
win.document.close();

win.onload = () => win.print();
}

/* ===== INIT ===== */
function render(){
renderShelf();
renderItems();
updateSelectors();
}

render();

</script>

</body>
</html>
