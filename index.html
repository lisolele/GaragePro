<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Pro</title>

<style>
*{ box-sizing:border-box; }
body{ margin:0;font-family:-apple-system, BlinkMacSystemFont, sans-serif;background:#f2f2f7; }
header{ padding:16px;text-align:center;background:white;font-weight:700;position:sticky;top:0;z-index:10;border-bottom:1px solid #eee; }
.container{ padding:14px;max-width:900px;margin:auto; }
.section{ background:white;padding:18px;margin-top:14px;border-radius:18px;box-shadow:0 6px 18px rgba(0,0,0,0.04); }
input,select,button{ width:100%;padding:12px;margin-top:8px;border-radius:12px;border:1px solid #ddd;font-size:15px; }
button{ background:#007aff;color:white;border:none;font-weight:600;cursor:pointer; }
.danger{ background:#ff3b30; }
.shelfGrid{ display:flex;gap:12px;overflow-x:auto; }
.shelf{ min-width:280px;background:#f9f9fb;border-radius:18px;padding:12px; }
.shelfHeader{ display:flex;justify-content:space-between;align-items:center;gap:10px; }
.level{ background:white;margin-top:10px;padding:10px;border-radius:12px;border:1px solid #eee; }
.small{ font-size:11px;opacity:0.6; }
#items div{ background:white;padding:10px;margin-top:8px;border-radius:12px;border:1px solid #eee;display:flex;justify-content:space-between;align-items:center; }
img.thumb{ width:50px;height:50px;object-fit:cover;border-radius:8px; }
#preview{ width:80px;margin-top:8px;border-radius:10px;display:none; }
</style>
</head>

<body>
<header>🚗 Garage Pro</header>

<div class="container">

<div class="section">
<h3>🗄️ Scaffali</h3>
<input id="shelfName" placeholder="Nome scaffale">
<button onclick="aggiungiScaffale()">Crea scaffale</button>
<div id="shelfView" class="shelfGrid"></div>
</div>

<div class="section">
<h3>📦 Oggetti</h3>
<input id="search" placeholder="🔍 Cerca..." oninput="renderItems()">
<input id="nome" placeholder="Nome">
<input id="categoria" placeholder="Categoria">
<input type="file" id="foto" accept="image/*">
<img id="preview">
<select id="selectShelf"></select>
<select id="selectLevel"></select>
<button onclick="salva()">Salva oggetto</button>
</div>

<div class="section">
<h3>📋 Lista</h3>
<div id="items"></div>
</div>

</div>

<script>
/* ===== STATE ===== */
let inventario = JSON.parse(localStorage.getItem("inv") || "[]");
let scaffali = JSON.parse(localStorage.getItem("shel") || "[]");

const $ = id => document.getElementById(id);
let currentImg = null;
let editingId = null;

/* ===== SAVE ===== */
function save(){
    localStorage.setItem("inv", JSON.stringify(inventario));
    localStorage.setItem("shel", JSON.stringify(scaffali));
}

/* ===== UTILS ===== */
function escapeHTML(str){
    return String(str).replace(/[&<>"']/g, m => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'
    }[m]));
}

function toBase64(file){
    return new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result);
        r.onerror=rej;
        r.readAsDataURL(file);
    });
}

/* ===== PREVIEW ===== */
$("foto").addEventListener("change",e=>{
    const f=e.target.files[0];
    if(f){
        $("preview").src=URL.createObjectURL(f);
        $("preview").style.display="block";
    }
});

/* ===== SCAFFALI ===== */
function aggiungiScaffale(){
    const n=$("shelfName").value.trim();
    if(!n) return alert("Nome obbligatorio");

    scaffali.push({nome:n,livelli:1});
    $("shelfName").value="";
    save();
    render();
}

function changeLevels(i,d){
    scaffali[i].livelli = Math.max(1, scaffali[i].livelli + d);

    inventario.forEach(o=>{
        if(o.shelf===i && o.level>=scaffali[i].livelli){
            o.level = scaffali[i].livelli-1;
        }
    });

    save();
    render();
}

/* ===== OGGETTI ===== */
async function salva(){
    const nome=$("nome").value.trim();
    if(!nome) return alert("Nome obbligatorio");

    const shelf=$("selectShelf").value;
    const level=$("selectLevel").value;
    if(shelf===""||level==="") return alert("Seleziona scaffale e ripiano");

    let img=currentImg;
    const f=$("foto").files[0];
    if(f) img=await toBase64(f);

    if(editingId){
    const index = inventario.findIndex(i => i.id === editingId);
    inventario[index] = {
        id: editingId,
        nome,
        categoria: $("categoria").value,
        shelf:Number(shelf),
        level:Number(level),
        img
    };
    editingId = null;
    } else {
    inventario.push({
        id:Date.now(),
        nome,
        categoria:$("categoria").value,
        shelf:Number(shelf),
        level:Number(level),
        img
    });
}

    currentImg=null;
    $("nome").value="";
    $("categoria").value="";
    $("foto").value="";
    $("preview").style.display="none";

    save();
    render();
}

function editItem(id){
    const i = inventario.find(x => x.id === id);
    if(!i) return;

    editingId = id;

    $("nome").value = i.nome;
    $("categoria").value = i.categoria || "";
    $("selectShelf").value = i.shelf;

    updateLevels();
    $("selectLevel").value = i.level;

    currentImg = i.img;

    if(i.img){
        $("preview").src = i.img;
        $("preview").style.display = "block";
    }
}
    
function deleteItem(id){
    inventario = inventario.filter(i=>i.id!==id);
    save();
    render();
}

/* ===== RENDER ===== */
function renderItems(){
    const c=$("items");
    c.innerHTML="";

    const q=$("search").value.toLowerCase();

    inventario.forEach(i=>{
        if(q && !(i.nome||"").toLowerCase().includes(q) && !(i.categoria||"").toLowerCase().includes(q)) return;

        const div=document.createElement("div");

       div.innerHTML = `
        <div style="display:flex;gap:10px;align-items:center;">
            ${i.img ? `<img src="${i.img}" class="thumb">` : ""}
            <div>
                <b>${escapeHTML(i.nome)}</b><br>
                <span class="small">${escapeHTML(i.categoria || "")}</span>
            </div>
        </div>

        <div style="display:flex;gap:6px;">
            <button onclick="event.stopPropagation();editItem(${i.id})">✏️</button>
            <button class="danger" onclick="event.stopPropagation();deleteItem(${i.id})">🗑</button>
        </div>
        `;

        c.appendChild(div);
    });
}

function renderShelves(){
    const c=$("shelfView");
    c.innerHTML="";

    scaffali.forEach((s,i)=>{
        const d=document.createElement("div");
        d.className="shelf";

        d.innerHTML=`
        <div class="shelfHeader">
            <input value="${escapeHTML(s.nome)}" oninput="scaffali[${i}].nome=this.value;save();">
            <div>
                <button onclick="changeLevels(${i},1)">+</button>
                <button class="danger" onclick="changeLevels(${i},-1)">-</button>
            </div>
        </div>
        `;

        for(let l=0;l<s.livelli;l++){
            const lv=document.createElement("div");
            lv.className="level";

            const items=inventario.filter(o=>o.shelf===i && o.level===l);

            lv.innerHTML=`
            <div class="small">Ripiano ${l+1}</div>
            <div>${items.map(o=>"• "+escapeHTML(o.nome)).join("<br>")||"(vuoto)"}</div>
            `;

            d.appendChild(lv);
        }

        c.appendChild(d);
    });
}

function updateSelectors(){
    const s=$("selectShelf");
    const l=$("selectLevel");

    s.innerHTML="";

    if(!scaffali.length){
        s.innerHTML="<option value=''>--</option>";
        l.innerHTML="<option>--</option>";
        return;
    }

    scaffali.forEach((sh,i)=>{
        s.innerHTML+=`<option value="${i}">${escapeHTML(sh.nome)}</option>`;
    });

    updateLevels();
}

function updateLevels(){
    const i=$("selectShelf").value;
    const l=$("selectLevel");

    l.innerHTML="";

    if(!scaffali[i]) return;

    for(let j=0;j<scaffali[i].livelli;j++){
        l.innerHTML+=`<option value="${j}">Ripiano ${j+1}</option>`;
    }
}

$("selectShelf").addEventListener("change",updateLevels);

function render(){
    renderShelves();
    renderItems();
    updateSelectors();
}

render();
</script>
</body>
</html>
