<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Garage Pro</title>

<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Garage Pro">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background:#f2f2f7;
    color:#111;
}

header{
    padding:16px;
    text-align:center;
    background:rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    font-weight:700;
    position:sticky;
    top:0;
    z-index:10;
    border-bottom:1px solid #e5e5ea;
}

.container{
    padding:14px;
    max-width:900px;
    margin:auto;
}

.section{
    background:white;
    padding:14px;
    margin-top:14px;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,0.04);
}

input,select,button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:12px;
    border:1px solid #e5e5ea;
    font-size:15px;
}

button{
    background:#007aff;
    color:white;
    border:none;
    font-weight:600;
}

button:active{
    transform:scale(0.98);
}

.danger{
    background:#ff3b30;
}

/* --- SCROLL CARDS --- */

.shelfGrid{
    display:flex;
    gap:12px;
    overflow-x:auto;
    padding-bottom:6px;
    scroll-snap-type:x mandatory;
}

.shelfGrid::-webkit-scrollbar{
    display:none;
}

.shelf{
    min-width:260px;
    max-width:260px;
    background:#f9f9fb;
    border-radius:18px;
    padding:12px;
    scroll-snap-align:start;
    box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.shelfHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.level{
    background:white;
    border-radius:14px;
    padding:10px;
    margin-top:10px;
    border:1px solid #eee;
}

.small{
    font-size:11px;
    opacity:0.6;
}

/* --- ITEMS --- */

.item{
    background:white;
    padding:10px;
    margin-top:8px;
    border-radius:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 3px 10px rgba(0,0,0,0.04);
}

.itemInfo{
    display:flex;
    align-items:center;
    gap:10px;
}

.item img{
    width:34px;
    height:34px;
    border-radius:10px;
    object-fit:cover;
}

.itemActions{
    display:flex;
    gap:6px;
}

.itemActions button{
    width:auto;
    padding:5px 8px;
    font-size:12px;
    border-radius:10px;
}

/* --- HIGHLIGHT --- */

mark{
    background:rgba(255,214,10,0.35);
    border-radius:4px;
    padding:0 2px;
}

</style>
</head>

<body>

<header>🚗 Garage Pro</header>

<div class="container">

<!-- OGGETTI -->
<div class="section">
<h3>📦 Oggetti</h3>

<input id="nome" placeholder="Nome">
<input id="categoria" placeholder="Categoria">
<input id="quantita" type="number" placeholder="Quantità">
<input type="file" id="itemImg">

<select id="selectShelf"></select>
<select id="selectLevel"></select>

<button onclick="salva()">Salva oggetto</button>
</div>

<!-- SCAFFALI -->
<div class="section">
<h3>🗄️ Scaffali</h3>

<input id="shelfName" placeholder="Nome scaffale">
<input id="levels" type="number" value="1">

<button onclick="aggiungiScaffale()">Crea scaffale</button>

<div id="shelfView" class="shelfGrid"></div>
</div>

<!-- LISTA OGGETTI -->
<div class="section">
<h3>📋 Lista oggetti</h3>

<input id="searchName" placeholder="🔎 Nome oggetto">
<input id="searchCategory" placeholder="🏷 Categoria">

<select id="searchShelf"></select>

<button onclick="resetFilters()" style="background:#8e8e93;">Reset filtri</button>

<div id="items"></div>
</div>

</div>

<script>

let inventario = JSON.parse(localStorage.getItem("garage_drag")) || [];
let scaffali = JSON.parse(localStorage.getItem("garage_shelves")) || [];

const $ = id => document.getElementById(id);

/* ---------------- SAVE ---------------- */

function save(){
    localStorage.setItem("garage_drag", JSON.stringify(inventario));
    localStorage.setItem("garage_shelves", JSON.stringify(scaffali));
}

/* ---------------- HIGHLIGHT ---------------- */

function highlight(text, query){
    if(!query) return text;

    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`(${escaped})`, "gi");

    return text.replace(regex, `<mark>$1</mark>`);
}

/* ---------------- FILTER RENDER ITEMS ---------------- */

function renderItems(){

    const c = $("items");

    const nameQ = $("searchName").value.toLowerCase().trim();
    const catQ = $("searchCategory").value.toLowerCase().trim();
    const shelfQ = $("searchShelf").value;

    c.innerHTML = "";

    inventario
    .filter(i=>{

        const matchName = !nameQ || i.nome?.toLowerCase().includes(nameQ);
        const matchCat = !catQ || i.categoria?.toLowerCase().includes(catQ);
        const matchShelf = !shelfQ || String(i.shelf) === String(shelfQ);

        return matchName && matchCat && matchShelf;
    })
    .forEach(i=>{

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <div class="itemInfo">
                ${i.img ? `<img src="${i.img}">` : ""}
                <div>
                    <b>${highlight(i.nome, nameQ)}</b><br>
                    <span class="small">${highlight(i.categoria || "", catQ)}</span>
                </div>
            </div>
            <div class="itemActions">
                <button onclick="editItem(${i.id})">✏️</button>
                <button class="danger" onclick="deleteItem(${i.id})">🗑</button>
            </div>
        `;

        c.appendChild(div);
    });
}

/* ---------------- SHELVES ---------------- */

function renderShelves(){

    const c = $("shelfView");
    c.innerHTML = "";

    scaffali.forEach((s,si)=>{

        const div = document.createElement("div");
        div.className = "shelf";

        div.innerHTML = `
            <div class="shelfHeader">
                <b>${s.nome}</b>
            </div>
        `;

        for(let li=0; li<s.livelli; li++){

            const lv = document.createElement("div");
            lv.className = "level";

            const oggetti = inventario.filter(i =>
                String(i.shelf) === String(si) &&
                String(i.level) === String(li)
            );

            lv.innerHTML = `
                <div class="small">Ripiano ${li+1}</div>
                <div>${oggetti.map(o=>"• "+o.nome).join("<br>") || "<span class='small'>(vuoto)</span>"}</div>
            `;

            div.appendChild(lv);
        }

        c.appendChild(div);
    });
}

/* ---------------- FILTER SELECT ---------------- */

function updateSelectors(){

    const s = $("selectShelf");
    const fs = $("searchShelf");

    s.innerHTML = "";
    fs.innerHTML = `<option value="">Tutti gli scaffali</option>`;

    scaffali.forEach((sh,i)=>{

        const o1 = document.createElement("option");
        o1.value = i;
        o1.text = sh.nome;
        s.appendChild(o1);

        const o2 = document.createElement("option");
        o2.value = i;
        o2.text = sh.nome;
        fs.appendChild(o2);
    });

    updateLevels();
}

function updateLevels(){

    const i = $("selectShelf").value;
    const lv = $("selectLevel");

    lv.innerHTML = "";

    if(!scaffali[i]) return;

    for(let j=0;j<scaffali[i].livelli;j++){
        const o = document.createElement("option");
        o.value = j;
        o.text = "Ripiano " + (j+1);
        lv.appendChild(o);
    }
}

/* ---------------- FILTER EVENTS ---------------- */

function bindFilters(){
    ["searchName","searchCategory","searchShelf"].forEach(id=>{
        $(id).addEventListener("input", renderItems);
        $(id).addEventListener("change", renderItems);
    });
}

function resetFilters(){
    $("searchName").value = "";
    $("searchCategory").value = "";
    $("searchShelf").value = "";
    renderItems();
}

/* ---------------- INIT ---------------- */

bindFilters();
renderItems();
renderShelves();
updateSelectors();

</script>

</body>
</html>
