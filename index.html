<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Garage Pro</title>

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>

*{ box-sizing:border-box; }

body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background:#f2f2f7;
    color:#111;
}

header{
    padding:16px;
    text-align:center;
    background:rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    font-weight:700;
    position:sticky;
    top:0;
    z-index:10;
    border-bottom:1px solid #e5e5ea;
}

.container{
    padding:14px;
    max-width:900px;
    margin:auto;
}

.section{
    background:white;
    padding:14px;
    margin-top:14px;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,0.04);
}

input,select,button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:12px;
    border:1px solid #e5e5ea;
    font-size:15px;
}

button{
    background:#007aff;
    color:white;
    border:none;
    font-weight:600;
}

button:active{ transform:scale(0.98); }

.danger{ background:#ff3b30; }

/* ===== SCAFFALI ===== */

.shelfGrid{
    display:flex;
    gap:12px;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
}

.shelfGrid::-webkit-scrollbar{ display:none; }

.shelf{
    min-width:260px;
    background:#f9f9fb;
    border-radius:18px;
    padding:12px;
    scroll-snap-align:start;
    box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.shelfHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
}

/* ===== LEVEL ===== */

.level{
    background:white;
    border-radius:14px;
    padding:10px;
    margin-top:10px;
    border:1px solid #eee;
}

/* ===== ITEMS ===== */

.itemActions{
    display:flex;
    gap:6px;
}

/* ===== SMALL TEXT ===== */

.small{
    font-size:11px;
    opacity:0.6;
}

</style>
</head>

<body>

<header>🚗 Garage Pro</header>

<div class="container">

<!-- OGGETTI -->
<div class="section">
<h3>📦 Oggetti</h3>

<input id="nome" placeholder="Nome">
<input id="categoria" placeholder="Categoria">

<select id="selectShelf"></select>
<select id="selectLevel"></select>

<button onclick="salva()">Salva oggetto</button>
</div>

<!-- SCAFFALI -->
<div class="section">
<h3>🗄️ Scaffali</h3>

<input id="shelfName" placeholder="Nome scaffale">
<input id="levels" type="number" value="1">

<button onclick="aggiungiScaffale()">Crea scaffale</button>

<div id="shelfView" class="shelfGrid"></div>
</div>

<!-- LISTA -->
<div class="section">
<h3>📋 Lista oggetti</h3>

<input id="searchName" placeholder="🔎 Nome">
<input id="searchCategory" placeholder="🏷 Categoria">

<select id="searchShelf"></select>

<button onclick="resetFilters()" style="background:#8e8e93;">Reset</button>

<div id="items"></div>
</div>

</div>

<script>

let inventario = JSON.parse(localStorage.getItem("garage_drag")) || [];
let scaffali = JSON.parse(localStorage.getItem("garage_shelves")) || [];

let editingItemId = null;

const $ = id => document.getElementById(id);

function save(){
    localStorage.setItem("garage_drag", JSON.stringify(inventario));
    localStorage.setItem("garage_shelves", JSON.stringify(scaffali));
}

/* ================= ITEMS ================= */

function renderItems(){

    const c = $("items");

    const nameQ = $("searchName").value.toLowerCase();
    const catQ = $("searchCategory").value.toLowerCase();
    const shelfQ = $("searchShelf").value;

    c.innerHTML = "";

    inventario
    .filter(i=>{
        return (
            (!nameQ || i.nome.toLowerCase().includes(nameQ)) &&
            (!catQ || i.categoria.toLowerCase().includes(catQ)) &&
            (!shelfQ || String(i.shelf) === String(shelfQ))
        );
    })
    .forEach(i=>{

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <div>
                <b>${i.nome}</b><br>
                <span class="small">${i.categoria||""}</span>
            </div>
            <div class="itemActions">
                <button onclick="editItem(${i.id})">✏️</button>
                <button class="danger" onclick="deleteItem(${i.id})">🗑</button>
            </div>
        `;

        c.appendChild(div);
    });
}

/* ================= EDIT / DELETE ================= */

function editItem(id){
    const i = inventario.find(x=>x.id==id);
    if(!i) return;

    $("nome").value = i.nome;
    $("categoria").value = i.categoria;

    editingItemId = id;
}

function deleteItem(id){
    inventario = inventario.filter(i=>i.id!=id);
    save();
    renderItems();
    renderShelves();
}

/* ================= SAVE ================= */

function salva(){

    const nome = $("nome").value.trim();
    if(!nome) return alert("Nome obbligatorio");

    if(editingItemId){

        const i = inventario.find(x=>x.id==editingItemId);
        if(i){
            i.nome = nome;
            i.categoria = $("categoria").value;
        }

        editingItemId = null;

    } else {

        inventario.push({
            id:Date.now(),
            nome,
            categoria:$("categoria").value,
            shelf:$("selectShelf").value,
            level:$("selectLevel").value
        });
    }

    save();
    renderItems();
    renderShelves();
}

/* ================= SCAFFALI ================= */

function aggiungiScaffale(){

    const nome = $("shelfName").value.trim();
    const livelli = parseInt($("levels").value||1);

    scaffali.push({nome, livelli});

    save();
    renderShelves();
    updateSelectors();
}

function deleteShelf(si){

    scaffali.splice(si,1);

    inventario.forEach(i=>{
        if(i.shelf==si){
            i.shelf=null;
            i.level=null;
        }
    });

    save();
    renderShelves();
    renderItems();
    updateSelectors();
}

function deleteLevel(si,li){

    scaffali[si].livelli--;

    inventario.forEach(i=>{
        if(i.shelf==si && i.level==li){
            i.level=null;
        }
        if(i.shelf==si && i.level>li){
            i.level--;
        }
    });

    save();
    renderShelves();
    renderItems();
    updateSelectors();
}

/* ================= SHELVES ================= */

function renderShelves(){

    const c = $("shelfView");
    c.innerHTML="";

    scaffali.forEach((s,si)=>{

        const div=document.createElement("div");
        div.className="shelf";

        div.innerHTML=`
            <div class="shelfHeader">
                <b>${s.nome}</b>
                <button class="danger" onclick="deleteShelf(${si})">🗑</button>
            </div>
        `;

        for(let li=0; li<s.livelli; li++){

            const lv=document.createElement("div");
            lv.className="level";

            const items=inventario.filter(i=>
                String(i.shelf)==String(si) &&
                String(i.level)==String(li)
            );

            /* ✅ ICONA CESTINO SEMPRE VISIBILE */
            lv.innerHTML = `
                <div style="
                    display:flex;
                    justify-content:space-between;
                    align-items:center;
                    margin-bottom:6px;
                ">
                    <div class="small">Ripiano ${li+1}</div>

                    <button onclick="deleteLevel(${si},${li})"
                        style="
                            width:28px;
                            height:28px;
                            border:none;
                            border-radius:8px;
                            background:#f2f2f7;
                            font-size:14px;
                            display:flex;
                            align-items:center;
                            justify-content:center;
                        ">
                        🗑
                    </button>
                </div>

                <div>
                    ${items.map(o=>"• "+o.nome).join("<br>")||"<span class='small'>(vuoto)</span>"}
                </div>
            `;

            div.appendChild(lv);
        }

        c.appendChild(div);
    });
}

/* ================= SELECTORS ================= */

function updateSelectors(){

    const s=$("selectShelf");
    const fs=$("searchShelf");

    s.innerHTML="";
    fs.innerHTML=`<option value="">Tutti</option>`;

    scaffali.forEach((sh,i)=>{
        s.innerHTML+=`<option value="${i}">${sh.nome}</option>`;
        fs.innerHTML+=`<option value="${i}">${sh.nome}</option>`;
    });

    updateLevels();
}

function updateLevels(){

    const i=$("selectShelf").value;
    const lv=$("selectLevel");

    lv.innerHTML="";

    if(!scaffali[i]) return;

    for(let j=0;j<scaffali[i].livelli;j++){
        lv.innerHTML+=`<option value="${j}">Ripiano ${j+1}</option>`;
    }
}

/* ================= FILTERS ================= */

function bindFilters(){
    ["searchName","searchCategory","searchShelf"].forEach(id=>{
        $(id).addEventListener("input",renderItems);
        $(id).addEventListener("change",renderItems);
    });
}

function resetFilters(){
    $("searchName").value="";
    $("searchCategory").value="";
    $("searchShelf").value="";
    renderItems();
}

/* ================= INIT ================= */

bindFilters();
renderItems();
renderShelves();
updateSelectors();

</script>

</body>
</html>
