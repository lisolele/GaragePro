<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Garage Pro</title>

<style>

body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background:#f2f2f7;
}

header{
    padding:16px;
    text-align:center;
    background:white;
    font-weight:700;
    position:sticky;
    top:0;
}

.container{ padding:14px; max-width:900px; margin:auto; }

.section{
    background:white;
    padding:14px;
    margin-top:14px;
    border-radius:18px;
}

input,select,button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:12px;
    border:1px solid #ddd;
}

button{
    background:#007aff;
    color:white;
    border:none;
    font-weight:600;
}

.danger{ background:#ff3b30; }

/* SCAFFALI */

.shelfGrid{
    display:flex;
    gap:12px;
    overflow-x:auto;
}

.shelf{
    min-width:280px;
    background:#f9f9fb;
    border-radius:18px;
    padding:12px;
}

.shelfHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

.level{
    background:white;
    margin-top:10px;
    padding:10px;
    border-radius:12px;
    border:1px solid #eee;
}

.small{ font-size:11px; opacity:0.6; }

/* UNDO BAR */

#undoBar{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#1c1c1e;
    color:white;
    padding:10px 12px;
    border-radius:14px;
    display:flex;
    gap:10px;
    align-items:center;
    font-size:14px;
}

</style>
</head>

<body>

<header>🚗 Garage Pro</header>

<div class="container">

<!-- OGGETTI -->
<div class="section">
<h3>📦 Oggetti</h3>

<input id="nome" placeholder="Nome">
<input id="categoria" placeholder="Categoria">

<select id="selectShelf"></select>
<select id="selectLevel"></select>

<button onclick="salva()">Salva oggetto</button>
</div>

<!-- SCAFFALI -->
<div class="section">
<h3>🗄️ Scaffali</h3>

<input id="shelfName" placeholder="Nome scaffale">
<button onclick="aggiungiScaffale()">Crea scaffale</button>

<div id="shelfView" class="shelfGrid"></div>
</div>

<!-- LISTA -->
<div class="section">
<h3>📋 Oggetti</h3>
<div id="items"></div>
</div>

</div>

<script>

/* ================= STATE ================= */

let inventario = JSON.parse(localStorage.getItem("inv")) || [];
let scaffali = JSON.parse(localStorage.getItem("shel")) || [];

let undoStack = [];
let redoStack = [];

const $ = id => document.getElementById(id);

/* ================= SAVE ================= */

function save(){
    localStorage.setItem("inv", JSON.stringify(inventario));
    localStorage.setItem("shel", JSON.stringify(scaffali));
}

/* ================= SNAPSHOT ================= */

function saveState(){
    undoStack.push({
        inventario: structuredClone(inventario),
        scaffali: structuredClone(scaffali)
    });
    redoStack = [];
    showUndo();
}

/* ================= UNDO / REDO ================= */

function undo(){
    if(!undoStack.length) return;

    redoStack.push(structuredClone({inventario,scaffali}));

    const s = undoStack.pop();
    inventario = s.inventario;
    scaffali = s.scaffali;

    save();
    render();
}

function redo(){
    if(!redoStack.length) return;

    undoStack.push(structuredClone({inventario,scaffali}));

    const s = redoStack.pop();
    inventario = s.inventario;
    scaffali = s.scaffali;

    save();
    render();
}

/* ================= UNDO UI ================= */

function showUndo(){

    let bar = document.getElementById("undoBar");

    if(!bar){
        bar = document.createElement("div");
        bar.id = "undoBar";
        document.body.appendChild(bar);
    }

    bar.innerHTML = `
        ⬅️ Undo (${undoStack.length})

        <button onclick="undo()" style="background:#007aff;border:none;color:white;padding:6px 10px;border-radius:10px;">
            Undo
        </button>

        <button onclick="redo()" style="background:#34c759;border:none;color:white;padding:6px 10px;border-radius:10px;">
            Redo
        </button>

        ➡️ (${redoStack.length})
    `;
}

/* ================= SCAFFALI ================= */

function aggiungiScaffale(){

    saveState();

    scaffali.push({
        nome:$("shelfName").value,
        livelli:1
    });

    render();
}

/* ➕➖ RIPIANI INLINE */
function changeLevels(i,delta){

    saveState();

    scaffali[i].livelli += delta;

    if(scaffali[i].livelli < 1)
        scaffali[i].livelli = 1;

    inventario.forEach(o=>{
        if(o.shelf==i && o.level>=scaffali[i].livelli){
            o.level = null;
        }
    });

    render();
}

/* ================= OGGETTI ================= */

function salva(){

    saveState();

    inventario.push({
        id:Date.now(),
        nome:$("nome").value,
        categoria:$("categoria").value,
        shelf:$("selectShelf").value,
        level:$("selectLevel").value
    });

    render();
}

/* ================= RENDER ================= */

function render(){
    renderShelves();
    renderItems();
    updateSelectors();
}

/* ================= SCAFFALI UI INLINE ================= */

function renderShelves(){

    const c=$("shelfView");
    c.innerHTML="";

    scaffali.forEach((s,i)=>{

        const div=document.createElement("div");
        div.className="shelf";

        div.innerHTML=`
            <div class="shelfHeader">

                <!-- INLINE EDIT NAME -->
                <input value="${s.nome}"
                    style="
                        border:none;
                        background:transparent;
                        font-weight:700;
                        font-size:16px;
                        width:60%;
                        outline:none;
                    "
                    oninput="scaffali[${i}].nome=this.value; save();"
                >

                <!-- RIPIANI -->
                <div style="display:flex;gap:6px;">
                    <button onclick="changeLevels(${i},1)">+</button>
                    <button onclick="changeLevels(${i},-1)" class="danger">-</button>
                </div>

            </div>
        `;

        for(let l=0;l<s.livelli;l++){

            const lv=document.createElement("div");
            lv.className="level";

            const items = inventario.filter(o=>o.shelf==i && o.level==l);

            lv.innerHTML=`
                <div class="small">Ripiano ${l+1}</div>
                <div>
                    ${items.map(o=>"• "+o.nome).join("<br>")||"<span class='small'>(vuoto)</span>"}
                </div>
            `;

            div.appendChild(lv);
        }

        c.appendChild(div);
    });
}

/* ================= ITEMS ================= */

function renderItems(){

    const c=$("items");
    c.innerHTML="";

    inventario.forEach(i=>{

        const div=document.createElement("div");
        div.innerHTML=`<b>${i.nome}</b>`;
        c.appendChild(div);
    });
}

/* ================= SELECT ================= */

function updateSelectors(){

    const s=$("selectShelf");
    const l=$("selectLevel");

    s.innerHTML="";

    scaffali.forEach((sh,i)=>{
        s.innerHTML+=`<option value="${i}">${sh.nome}</option>`;
    });

    updateLevels();
}

function updateLevels(){

    const i=$("selectShelf").value;
    const l=$("selectLevel");

    l.innerHTML="";

    if(!scaffali[i]){
        l.innerHTML="<option>--</option>";
        return;
    }

    for(let j=0;j<scaffali[i].livelli;j++){
        l.innerHTML+=`<option value="${j}">Ripiano ${j+1}</option>`;
    }
}

$("selectShelf").addEventListener("change", updateLevels);

/* ================= INIT ================= */

render();

</script>

</body>
</html>
