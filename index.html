<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Modular</title>

<style>
body{margin:0;font-family:sans-serif;background:#f4f4f7}

header{
position:sticky;top:0;background:#fff;
padding:10px;display:flex;justify-content:space-between;
border-bottom:1px solid #eee;
}

.container{padding:12px;max-width:900px;margin:auto}

.section{background:#fff;padding:12px;border-radius:12px;margin-top:12px}

/* generic UI */
button{padding:8px;border-radius:8px;border:none;background:#007aff;color:#fff}
input,select{width:100%;padding:8px;margin-top:6px}

/* items */
.item{padding:10px;border:1px solid #eee;border-radius:10px;margin-top:8px;cursor:pointer}

/* modal */
#modal{display:none;position:fixed;inset:0;background:#0008;justify-content:center;align-items:center}
#modalBox{background:#fff;padding:12px;border-radius:12px;width:90%;max-width:400px}

#zoom{display:none;position:fixed;inset:0;background:#000;justify-content:center;align-items:center}
#zoom img{max-width:100%;max-height:100%}
</style>
</head>

<body>

<header>
<div>🚗 Garage Modular</div>
<div>
<button onclick="UndoRedo.undo()">↩</button>
<button onclick="UndoRedo.redo()">↪</button>
<button onclick="ImportExport.export()">⬇</button>
<button onclick="ImportExport.import()">⬆</button>
</div>
</header>

<div class="container">

<div class="section">
<h3>Oggetti</h3>

<input id="itemName" placeholder="Nome">
<input type="file" id="itemImg">

<button onclick="Items.add()">Aggiungi</button>

<div id="items"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" onclick="Modal.close()">
<div id="modalBox" onclick="event.stopPropagation()"></div>
</div>

<!-- ZOOM -->
<div id="zoom" onclick="Media.closeZoom()">
<img id="zoomImg">
</div>

<script>

/* ================= CORE STATE ================= */

const State = {
data:{
items:[],
shelves:[]
},
set(fn){
fn(this.data);
Storage.save();
Render.all();
}
};

/* ================= STORAGE ================= */

const Storage = {
key:"garage_mod",
save(){
localStorage.setItem(this.key,JSON.stringify(State.data));
},
load(){
const d=localStorage.getItem(this.key);
if(d) State.data=JSON.parse(d);
}
};

/* ================= RENDER ENGINE ================= */

const Render = {
items(){
const c=document.getElementById("items");
c.innerHTML="";
State.data.items.forEach(i=>{
const d=document.createElement("div");
d.className="item";
d.innerHTML=`<b>${i.name}</b>`;
d.onclick=()=>Modal.open(i);
c.appendChild(d);
});
},
all(){
this.items();
}
};

/* ================= ITEMS MODULE ================= */

const Items = {
async add(){

const name=document.getElementById("itemName").value;
const file=document.getElementById("itemImg").files[0];

let img=null;
if(file) img=await Media.toBase64(file);

State.set(s=>{
s.items.push({
id:Date.now(),
name,
img
});
});
}
};

/* ================= MEDIA MODULE ================= */

const Media = {
toBase64(file){
return new Promise(r=>{
const fr=new FileReader();
fr.onload=()=>r(fr.result);
fr.readAsDataURL(file);
});
},
zoom(src){
document.getElementById("zoomImg").src=src;
document.getElementById("zoom").style.display="flex";
},
closeZoom(){
document.getElementById("zoom").style.display="none";
}
};

/* ================= MODAL ================= */

const Modal = {
open(item){
const box=document.getElementById("modalBox");
box.innerHTML=`
<h3>${item.name}</h3>
${item.img?`<img src="${item.img}" style="width:100%" onclick="Media.zoom(this.src)">`:``}
`;
document.getElementById("modal").style.display="flex";
},
close(){
document.getElementById("modal").style.display="none";
}
};

/* ================= UNDO REDO ================= */

const UndoRedo = {
stack:[],
redo:[],
snap(){
return JSON.stringify(State.data);
},
undo(){
if(!this.stack.length) return;
this.redo.push(this.snap());
State.data=JSON.parse(this.stack.pop());
Storage.save();
Render.all();
},
redo(){
if(!this.redo.length) return;
this.stack.push(this.snap());
State.data=JSON.parse(this.redo.pop());
Storage.save();
Render.all();
},
push(){
this.stack.push(this.snap());
this.redo=[];
}
};

/* wrap State.set */
const _set=State.set.bind(State);
State.set=function(fn){
UndoRedo.push();
_set(fn);
};

/* ================= IMPORT EXPORT ================= */

const ImportExport={
export(){
const blob=new Blob([JSON.stringify(State.data)],{type:"application/json"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="backup.json";
a.click();
},
import(){
const inp=document.createElement("input");
inp.type="file";
inp.onchange=e=>{
const f=e.target.files[0];
const r=new FileReader();
r.onload=ev=>{
State.set(s=>{
State.data=JSON.parse(ev.target.result);
});
};
r.readAsText(f);
};
inp.click();
}
};

/* ================= INIT ================= */

Storage.load();
Render.all();

</script>

</body>
</html>
