<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Pro</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f2f2f7;
}

header{
position:sticky;
top:0;
background:#fff;
border-bottom:1px solid #eee;
z-index:10;
padding:10px 12px;
font-weight:700;
}

.container{padding:12px;max-width:900px;margin:auto}

.section{
background:#fff;
padding:14px;
border-radius:14px;
margin-top:12px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:10px;
border:1px solid #ddd;
font-size:13px;
}

button{
background:#007aff;
color:#fff;
border:none;
font-weight:600;
cursor:pointer;
}

.danger{background:#ff3b30}

/* ===== SCAFFALI ===== */
.shelf{
border:1px solid #eee;
border-radius:12px;
padding:10px;
margin-top:10px;
}

.row{
display:flex;
gap:6px;
align-items:center;
margin-top:6px;
}

.row input{
flex:1;
border:none;
background:#f5f5f5;
padding:6px;
border-radius:8px;
font-size:12px;
}

/* ===== OGGETTI ===== */
.item{
display:flex;
gap:10px;
align-items:center;
padding:10px;
border:1px solid #eee;
border-radius:12px;
margin-top:10px;
background:#fff;
cursor:pointer;
}

.item img{
width:48px;height:48px;
border-radius:10px;
object-fit:cover;
background:#eee;
}

.meta{font-size:11px;opacity:.7}

/* ===== MODAL ===== */
#modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
justify-content:center;
align-items:center;
z-index:9999;
}

.box{
background:#fff;
width:90%;
max-width:420px;
border-radius:14px;
padding:14px;
}

.box img{
width:100%;
border-radius:10px;
margin-top:10px;
cursor:zoom-in;
}

/* ===== ZOOM ===== */
#zoom{
display:none;
position:fixed;
inset:0;
background:#000;
z-index:10000;
justify-content:center;
align-items:center;
}

#zoom img{
max-width:100%;
max-height:100%;
}
</style>
</head>

<body>

<header>🚗 Garage Pro (Refactored Core)</header>

<div class="container">

<div class="section">
<h3>Scaffali</h3>
<input id="shelfName" placeholder="Nome scaffale">
<button onclick="addShelf()">+ scaffale</button>
<div id="shelfView"></div>
</div>

<div class="section">
<h3>Oggetti</h3>

<input id="itemName" placeholder="Nome">
<input id="itemCat" placeholder="Categoria">
<input id="itemImg" placeholder="URL immagine">

<select id="shelfSelect"></select>
<select id="levelSelect"></select>

<button onclick="addItem()">+ oggetto</button>
</div>

<div class="section">
<h3>Lista</h3>
<div id="items"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
<div class="box" onclick="event.stopPropagation()">
<h3 id="mTitle"></h3>
<div id="mCat"></div>
<img id="mImg" onclick="zoom(this.src)">
</div>
</div>

<!-- ZOOM -->
<div id="zoom" onclick="closeZoom()">
<img id="zoomImg">
</div>

<script>

/* =====================================================
🧠 STATE CENTRALIZZATO (CORE DEL SISTEMA)
===================================================== */

const state = {
scaffali: JSON.parse(localStorage.getItem("shel")) || [],
inventario: JSON.parse(localStorage.getItem("inv")) || []
};

const $ = id => document.getElementById(id);

/* =====================================================
💾 PERSISTENZA
===================================================== */

function save(){
localStorage.setItem("shel", JSON.stringify(state.scaffali));
localStorage.setItem("inv", JSON.stringify(state.inventario));
}

/* =====================================================
🔁 RENDER UNICO (REGOLA FONDAMENTALE)
===================================================== */

function render(){
renderShelves();
renderItems();
renderSelectors();
}

/* =====================================================
🗄 SCAFFALI CRUD
===================================================== */

function addShelf(){
const name = $("shelfName").value.trim();
if(!name) return;

state.scaffali.push({
nome:name,
livelli:[{nome:"Ripiano 1"}]
});

$("shelfName").value="";
save();
render();
}

function renameShelf(i,val){
state.scaffali[i].nome = val;
save();
}

function deleteShelf(i){

state.inventario = state.inventario.filter(o=>o.shelf!==i);
state.scaffali.splice(i,1);

save();
render();
}

/* =====================================================
📦 RIPIANI CRUD
===================================================== */

function addLevel(i){
state.scaffali[i].livelli.push({
nome:`Ripiano ${state.scaffali[i].livelli.length+1}`
});
save();
render();
}

function renameLevel(i,l,val){
state.scaffali[i].livelli[l].nome = val;
save();
}

function deleteLevel(i,l){

state.scaffali[i].livelli.splice(l,1);

state.inventario = state.inventario.filter(o=>{
if(o.shelf!==i) return true;
if(o.level===l) return false;
if(o.level>l) o.level--;
return true;
});

save();
render();
}

/* =====================================================
📦 OGGETTI CRUD
===================================================== */

function addItem(){

const name = $("itemName").value.trim();
if(!name) return;

state.inventario.push({
id:Date.now(),
nome:name,
categoria:$("itemCat").value,
img:$("itemImg").value || "",
shelf:Number($("shelfSelect").value),
level:Number($("levelSelect").value)
});

$("itemName").value="";
$("itemCat").value="";
$("itemImg").value="";

save();
render();
}

function deleteItem(id){
state.inventario = state.inventario.filter(i=>i.id!==id);
save();
render();
}

/* =====================================================
🖼 POPUP OGGETTO
===================================================== */

function openModal(item){

$("mTitle").textContent = item.nome;
$("mCat").textContent = item.categoria || "";

if(item.img){
$("mImg").src = item.img;
$("mImg").style.display="block";
}else{
$("mImg").style.display="none";
}

$("modal").style.display="flex";
}

function closeModal(){
$("modal").style.display="none";
}

/* =====================================================
🔍 ZOOM IMMAGINE
===================================================== */

function zoom(src){
$("zoomImg").src = src;
$("zoom").style.display="flex";
}

function closeZoom(){
$("zoom").style.display="none";
}

/* =====================================================
🧾 RENDER SCAFFALI
===================================================== */

function renderShelves(){

const c = $("shelfView");
c.innerHTML="";

state.scaffali.forEach((s,i)=>{

const div = document.createElement("div");
div.className="shelf";

div.innerHTML=`
<div class="row">
<input value="${s.nome}" oninput="renameShelf(${i},this.value)">
<button class="danger" onclick="deleteShelf(${i})">×</button>
</div>

<button onclick="addLevel(${i})">+ ripiano</button>
`;

s.livelli.forEach((l,idx)=>{
div.innerHTML+=`
<div class="row">
<input value="${l.nome}" oninput="renameLevel(${i},${idx},this.value)">
<button class="danger" onclick="deleteLevel(${i},${idx})">×</button>
</div>
`;
});

c.appendChild(div);
});
}

/* =====================================================
📦 RENDER OGGETTI
===================================================== */

function renderItems(){

const c = $("items");
c.innerHTML="";

state.inventario.forEach(i=>{

const shelf = state.scaffali[i.shelf]?.nome || "-";
const level = state.scaffali[i.shelf]?.livelli?.[i.level]?.nome || "-";

const div = document.createElement("div");
div.className="item";

div.onclick = ()=>openModal(i);

div.innerHTML=`
${i.img ? `<img src="${i.img}">` : `<div style="width:48px;height:48px;background:#eee;border-radius:10px"></div>`}

<div style="flex:1">
<div><b>${i.nome}</b></div>
<div class="meta">${i.categoria||"-"} • ${shelf} • ${level}</div>
</div>
`;

c.appendChild(div);
});
}

/* =====================================================
📌 SELECTORS SAFE
===================================================== */

function renderSelectors(){

const s = $("shelfSelect");
s.innerHTML="";

state.scaffali.forEach((x,i)=>{
s.innerHTML+=`<option value="${i}">${x.nome}</option>`;
});

updateLevels();
}

function updateLevels(){

const i = Number($("shelfSelect").value);
const l = $("levelSelect");

l.innerHTML="";

if(!state.scaffali[i]) return;

state.scaffali[i].livelli.forEach((x,idx)=>{
l.innerHTML+=`<option value="${idx}">${x.nome}</option>`;
});
}

$("shelfSelect").onchange = updateLevels;

/* =====================================================
🚀 INIT
===================================================== */

render();

</script>

</body>
</html>
