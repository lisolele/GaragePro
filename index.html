<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f2f2f7;
}

/* HEADER */
header{
position:sticky;
top:0;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 12px;
border-bottom:1px solid #eee;
font-weight:700;
z-index:10;
}

.actions{
display:flex;
gap:6px;
}

.actions button{
width:auto;
padding:4px 8px;
font-size:12px;
border-radius:8px;
background:#1c1c1e;
color:#fff;
border:none;
cursor:pointer;
}

/* LAYOUT */
.container{padding:12px;max-width:1000px;margin:auto}

.section{
background:#fff;
padding:14px;
border-radius:14px;
margin-top:12px;
}

/* INPUT */
input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:10px;
border:1px solid #ddd;
}

button{
background:#007aff;
color:#fff;
border:none;
font-weight:600;
}

/* SCAFFALI */
.shelf{
border:1px solid #eee;
border-radius:12px;
padding:10px;
margin-top:10px;
background:#fafafa;
}

.level{
display:flex;
gap:6px;
margin-top:6px;
align-items:center;
}

.level input{
flex:1;
padding:6px;
border:none;
border-radius:8px;
background:#fff;
font-size:12px;
}

.smallBtn{
width:auto;
padding:4px 6px;
font-size:11px;
}

/* ITEMS */
.item{
display:flex;
gap:10px;
padding:10px;
border:1px solid #eee;
border-radius:12px;
margin-top:10px;
background:#fff;
cursor:pointer;
}

.item img{
width:50px;
height:50px;
border-radius:10px;
object-fit:cover;
background:#eee;
}

/* MODAL */
#modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
z-index:20;
}

.box{
background:#fff;
padding:14px;
border-radius:14px;
width:90%;
max-width:420px;
}

/* ZOOM */
#zoom{
display:none;
position:fixed;
inset:0;
background:#000;
justify-content:center;
align-items:center;
z-index:30;
}

#zoom img{
max-width:100%;
max-height:100%;
}
</style>
</head>

<body>

<header>
<div>🚗 Garage Pro</div>

<div class="actions">
<button onclick="undo()">↩</button>
<button onclick="redo()">↪</button>
<button onclick="exportPDF()">📄</button>
<button onclick="exportBackup()">⬇</button>
<button onclick="document.getElementById('importFile').click()">⬆</button>
<input type="file" id="importFile" hidden onchange="importBackup(event)">
</div>
</header>

<div class="container">

<div class="section">
<h3>Scaffali</h3>
<input id="shelfName" placeholder="Nome scaffale">
<button onclick="addShelf()">Crea</button>
<div id="shelfView"></div>
</div>

<div class="section">
<h3>Oggetti</h3>

<input id="itemName" placeholder="Nome">
<input id="itemCat" placeholder="Categoria">

<input type="file" id="imgFile">

<select id="shelfSelect"></select>
<select id="levelSelect"></select>

<button onclick="addItem()">Aggiungi</button>
</div>

<div class="section">
<h3>Inventario</h3>
<div id="items"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
<div class="box" onclick="event.stopPropagation()">
<h3 id="mName"></h3>
<div id="mCat"></div>
<img id="mImg" onclick="zoom(this.src)">
</div>
</div>

<!-- ZOOM -->
<div id="zoom" onclick="closeZoom()">
<img id="zoomImg">
</div>

<script>

/* ================= STATE UNICO ================= */

let state = {
scaffali: JSON.parse(localStorage.getItem("garage"))?.scaffali || [],
inventario: JSON.parse(localStorage.getItem("garage"))?.inventario || []
};

let undoStack = [];
let redoStack = [];

const $ = id => document.getElementById(id);

/* ================= SAVE ================= */

function save(){
localStorage.setItem("garage", JSON.stringify(state));
}

/* ================= SNAPSHOT ================= */

function snap(){ return JSON.stringify(state); }
function restore(s){ state = JSON.parse(s); }

function pushUndo(){
undoStack.push(snap());
redoStack = [];
}

/* ================= UNDO REDO ================= */

function undo(){
if(!undoStack.length) return;
redoStack.push(snap());
restore(undoStack.pop());
save(); render();
}

function redo(){
if(!redoStack.length) return;
undoStack.push(snap());
restore(redoStack.pop());
save(); render();
}

/* ================= IMAGE ================= */

function toBase64(file){
return new Promise(r=>{
const fr = new FileReader();
fr.onload = ()=>r(fr.result);
fr.readAsDataURL(file);
});
}

/* ================= SCAFFALI ================= */

function addShelf(){
const n = $("shelfName").value.trim();
if(!n) return;

pushUndo();

state.scaffali.push({
nome:n,
livelli:[{nome:"Ripiano 1"}]
});

$("shelfName").value="";
save(); render();
}

function renameShelf(i,v){
state.scaffali[i].nome = v;
save();
}

function deleteShelf(i){
pushUndo();

state.scaffali.splice(i,1);
state.inventario = state.inventario.filter(x=>x.shelf!==i);

save(); render();
}

/* ================= LEVELS ================= */

function addLevel(i){
pushUndo();
state.scaffali[i].livelli.push({nome:`Ripiano ${state.scaffali[i].livelli.length+1}`});
save(); render();
}

function renameLevel(i,l,v){
state.scaffali[i].livelli[l].nome = v;
save();
}

function deleteLevel(i,l){
pushUndo();

state.scaffali[i].livelli.splice(l,1);

state.inventario = state.inventario.filter(o=>{
if(o.shelf!==i) return true;
if(o.level===l) return false;
if(o.level>l) o.level--;
return true;
});

save(); render();
}

/* ================= ITEMS ================= */

async function addItem(){

const n = $("itemName").value.trim();
if(!n) return;

pushUndo();

let img = null;
const f = $("imgFile").files[0];
if(f) img = await toBase64(f);

state.inventario.push({
id:Date.now(),
nome:n,
categoria:$("itemCat").value,
img,
shelf:Number($("shelfSelect").value),
level:Number($("levelSelect").value)
});

$("itemName").value="";
$("itemCat").value="";
$("imgFile").value="";

save(); render();
}

/* ================= EXPORT BACKUP ================= */

function exportBackup(){
const blob = new Blob([JSON.stringify(state)], {type:"application/json"});
const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = "garage_backup.json";
a.click();

URL.revokeObjectURL(url);
}

/* ================= IMPORT BACKUP ================= */

function importBackup(e){
const f = e.target.files[0];
if(!f) return;

const r = new FileReader();
r.onload = ev=>{
pushUndo();
state = JSON.parse(ev.target.result);
save(); render();
};
r.readAsText(f);
}

/* ================= PDF ================= */

function exportPDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let y = 10;

doc.text("Garage Pro Inventario", 10, y);
y+=10;

state.scaffali.forEach((s,i)=>{

doc.text("Scaffale: "+s.nome,10,y);
y+=6;

state.inventario.filter(o=>o.shelf===i).forEach(o=>{
if(y>280){doc.addPage();y=10;}
doc.text(`${o.nome} - ${o.categoria||"-"} - R${o.level+1}`,10,y);
y+=6;
});

y+=6;

});

doc.save("inventario.pdf");
}

/* ================= RENDER ================= */

function render(){

const sv = $("shelfView");
sv.innerHTML="";

state.scaffali.forEach((s,i)=>{

const d = document.createElement("div");
d.className="shelf";

d.innerHTML=`
<input value="${s.nome}" oninput="renameShelf(${i},this.value)">
<button onclick="addLevel(${i})">+ livello</button>
<button onclick="deleteShelf(${i})">del scaffale</button>
`;

(s.livelli||[]).forEach((l,li)=>{
d.innerHTML+=`
<div class="level">
<input value="${l.nome}" oninput="renameLevel(${i},${li},this.value)">
<button onclick="deleteLevel(${i},${li})">x</button>
</div>
`;
});

sv.appendChild(d);
});

const iv = $("items");
iv.innerHTML="";

state.inventario.forEach(o=>{
const d = document.createElement("div");
d.className="item";

d.innerHTML=`
<div style="width:50px;height:50px;background:#eee;border-radius:10px"></div>
<div><b>${o.nome}</b><br><small>${o.categoria||"-"}</small></div>
`;

iv.appendChild(d);
});

/* selectors */
const s = $("shelfSelect");
s.innerHTML="";

state.scaffali.forEach((x,i)=>{
s.innerHTML+=`<option value="${i}">${x.nome}</option>`;
});

updateLevels();
}

function updateLevels(){
const i = Number($("shelfSelect").value);
const l = $("levelSelect");

l.innerHTML="";

if(!state.scaffali[i]) return;

(state.scaffali[i].livelli||[]).forEach((x,idx)=>{
l.innerHTML+=`<option value="${idx}">${x.nome}</option>`;
});
}

$("shelfSelect").onchange = updateLevels;

/* INIT */
render();

</script>

</body>
</html>
