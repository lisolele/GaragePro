<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Pro iOS</title>

<style>
body{
    margin:0;
    font-family:-apple-system, sans-serif;
    background:#f2f2f7;
}

header{
    padding:16px;
    text-align:center;
    background:white;
    font-weight:600;
    position:sticky;
    top:0;
}

.container{padding:12px; max-width:900px; margin:auto;}

.section{
    background:white;
    padding:12px;
    margin-top:12px;
    border-radius:12px;
}

input,select,button{
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    background:#007aff;
    color:white;
    border:none;
}

.danger{
    background:#ff3b30;
    color:white;
    border:none;
}

.shelf{
    background:#f5f5f7;
    padding:10px;
    border-radius:12px;
    margin-top:10px;
}

.level{
    background:white;
    margin-top:6px;
    padding:8px;
    border-radius:8px;
    border:1px dashed #ccc;
    position:relative;
}

.level button{
    position:absolute;
    right:4px;
    top:4px;
    font-size:10px;
    width:auto;
    padding:2px 6px;
}

.item{
    background:white;
    padding:8px;
    margin-top:6px;
    border-radius:10px;
    font-size:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.item img{
    width:30px;
    height:30px;
    object-fit:cover;
    border-radius:6px;
    margin-right:6px;
}

.small{font-size:11px; opacity:0.7;}

.row{display:flex; gap:6px;}

</style>
</head>

<body>

<header>🚗 Garage Pro iOS</header>

<div class="container">

<!-- SCAFFALI -->
<div class="section">
<h3>🗄️ Crea scaffale</h3>

<input id="shelfName" placeholder="Nome scaffale">
<input id="levels" type="number" placeholder="Ripiani" value="1">
<button onclick="addShelf()">Crea scaffale</button>
</div>

<div id="shelfView"></div>

<!-- OGGETTI -->
<div class="section">
<h3>📦 Oggetti</h3>

<input id="itemName" placeholder="Nome">
<input id="itemCat" placeholder="Categoria">
<input id="itemQty" type="number" placeholder="Quantità">

<input type="file" id="itemImg">

<select id="shelfSelect"></select>
<select id="levelSelect"></select>

<button onclick="saveItem()">Salva oggetto</button>
</div>

<div id="itemView"></div>

</div>

<script>

let shelves = JSON.parse(localStorage.getItem("shelves")) || [];
let items = JSON.parse(localStorage.getItem("items")) || [];

let editingId = null;
let imgData = null;

// SAFE DOM
const $ = id => document.getElementById(id);

// SAVE
function save(){
    localStorage.setItem("shelves", JSON.stringify(shelves));
    localStorage.setItem("items", JSON.stringify(items));
}

// ===================== SCAFFALI =====================

// FIX DEFINITIVO iOS SAFE
function addShelf(){

    const name = $("shelfName").value.trim();
    const levels = parseInt($("levels").value || "1");

    if(!name){
        alert("Inserisci nome scaffale");
        return;
    }

    shelves.push({name, levels});

    save();
    renderShelves();
    updateSelect();

    $("shelfName").value = "";
    $("levels").value = 1;
}

// DELETE SCAFFALE
function deleteShelf(i){

    shelves.splice(i,1);

    items.forEach(it=>{
        if(it.shelf == i){
            it.shelf = null;
            it.level = null;
        }
    });

    save();
    renderShelves();
    renderItems();
    updateSelect();
}

// DELETE LEVEL
function deleteLevel(si, li){

    shelves[si].levels--;

    items.forEach(it=>{
        if(it.shelf == si && it.level == li){
            it.level = null;
        }
    });

    save();
    renderShelves();
}

// RENDER SCAFFALI
function renderShelves(){

    const c = $("shelfView");
    c.innerHTML = "";

    shelves.forEach((s,i)=>{

        const div = document.createElement("div");
        div.className = "shelf";

        div.innerHTML = `
            <b>${s.name}</b>
            <button class="danger" onclick="deleteShelf(${i})">Elimina scaffale</button>
        `;

        for(let j=0;j<s.levels;j++){

            const lv = document.createElement("div");
            lv.className = "level";

            lv.innerHTML = `
                Ripiano ${j+1}
                <button onclick="deleteLevel(${i},${j})">x</button>
            `;

            lv.ondragover = e => e.preventDefault();
            lv.ondrop = e => drop(e,i,j);

            div.appendChild(lv);
        }

        c.appendChild(div);
    });
}

// ===================== OGGETTI =====================

itemImg.onchange = e=>{
    const f = e.target.files[0];
    if(!f) return;

    const r = new FileReader();
    r.onload = ev => imgData = ev.target.result;
    r.readAsDataURL(f);
};

// SAVE ITEM
function saveItem(){

    const name = $("itemName").value.trim();

    if(!name){
        alert("Nome obbligatorio");
        return;
    }

    if(editingId){

        const it = items.find(x=>x.id==editingId);
        if(it){
            it.name = name;
            it.cat = $("itemCat").value;
            it.qty = $("itemQty").value;
            it.shelf = $("shelfSelect").value;
            it.level = $("levelSelect").value;
        }

        editingId = null;

    } else {

        items.push({
            id:Date.now(),
            name,
            cat:$("itemCat").value,
            qty:$("itemQty").value,
            img:imgData,
            shelf:$("shelfSelect").value,
            level:$("levelSelect").value
        });
    }

    save();
    renderItems();
}

// EDIT
function editItem(id){

    const it = items.find(x=>x.id==id);
    if(!it) return;

    $("itemName").value = it.name;
    $("itemCat").value = it.cat;
    $("itemQty").value = it.qty;

    $("shelfSelect").value = it.shelf;
    updateLevels();
    $("levelSelect").value = it.level;

    editingId = id;
}

// DELETE ITEM
function deleteItem(id){

    items = items.filter(i=>i.id!=id);
    save();
    renderItems();
}

// DROP
function drop(e,si,li){

    const id = e.dataTransfer.getData("id");

    items.forEach(i=>{
        if(i.id==id){
            i.shelf = si;
            i.level = li;
        }
    });

    save();
    renderItems();
}

// RENDER ITEMS
function renderItems(){

    const c = $("itemView");
    c.innerHTML = "";

    items.forEach(i=>{

        const div = document.createElement("div");
        div.className = "item";
        div.draggable = true;

        div.ondragstart = e=>e.dataTransfer.setData("id",i.id);

        div.innerHTML = `
            <div class="row">
                ${i.img?`<img src="${i.img}">`:""}
                <div>
                    <b>${i.name}</b><br>
                    <span class="small">${i.cat}</span>
                </div>
            </div>
            <div>
                <button onclick="editItem(${i.id})">✏️</button>
                <button onclick="deleteItem(${i.id})">🗑</button>
            </div>
        `;

        c.appendChild(div);
    });
}

// ===================== DROPDOWN =====================

function updateSelect(){

    const s = $("shelfSelect");
    s.innerHTML = "";

    shelves.forEach((sh,i)=>{
        const o = document.createElement("option");
        o.value = i;
        o.text = sh.name;
        s.appendChild(o);
    });

    updateLevels();
}

function updateLevels(){

    const i = $("shelfSelect").value;
    const lv = $("levelSelect");

    lv.innerHTML = "";

    if(!shelves[i]) return;

    for(let j=0;j<shelves[i].levels;j++){
        const o = document.createElement("option");
        o.value = j;
        o.text = "Ripiano " + (j+1);
        lv.appendChild(o);
    }
}

$("shelfSelect").onchange = updateLevels;

// INIT
renderShelves();
renderItems();
updateSelect();

</script>

</body>
</html>
