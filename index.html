header{

/* MODAL */

}

/* ===== UNDO / REDO ===== */
/* ===== UNDO REDO ===== */
function undo(){

redoStack.push(structuredClone({inventario,scaffali}));

    const s = undoStack.pop();
    inventario = s.inventario;
    scaffali = s.scaffali;

    render();
    let s=undoStack.pop();
    inventario=s.inventario;
    scaffali=s.scaffali;
    save(); render();
}

function redo(){

/* ===== UTILS ===== */
function escapeHTML(str){
    return String(str).replace(/[&<>"']/g, m => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#039;'
    return String(str).replace(/[&<>"']/g,m=>({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'
}[m]));
}

/* ===== HIGHLIGHT SAFE ===== */
function escapeRegExp(string){
    return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
function escapeRegExp(str){
    return str.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
}
function highlight(text,q){
    if(!q) return escapeHTML(text);
    return escapeHTML(text).replace(new RegExp(`(${escapeRegExp(q)})`,"gi"),"<mark>$1</mark>");
}
function toBase64(file){
    return new Promise((res,rej)=>{
        let r=new FileReader();
        r.readAsDataURL(file);
        r.onload=()=>res(r.result);
        r.onerror=rej;
    });
}

function highlight(text, query){
    if(!query) return escapeHTML(text);

    const safe = escapeRegExp(query);
    const regex = new RegExp(`(${safe})`, "gi");
/* ===== PREVIEW ===== */
$("foto").addEventListener("change",e=>{
    let f=e.target.files[0];
    if(f){
        $("preview").src=URL.createObjectURL(f);
        $("preview").style.display="block";
    }
});

/* ===== MODAL ===== */
function openModal(item){
    const shelfName=scaffali[item.shelf]?.nome||"-";
    const level=item.level!=null?(item.level+1):"-";

    $("modalContent").innerHTML=`
        ${item.img?`<img src="${item.img}" onclick="zoomImage('${item.img}')" style="width:100%;border-radius:12px;margin-bottom:10px;cursor:zoom-in;">`:""}
        <h3>${escapeHTML(item.nome)}</h3>
        <div class="small">Categoria: ${escapeHTML(item.categoria||"-")}</div>
        <div class="small">Scaffale: ${escapeHTML(shelfName)}</div>
        <div class="small">Ripiano: ${level}</div>

        <div style="display:flex;gap:8px;margin-top:12px;">
            <button onclick="editItem(${item.id});closeModal()">✏️</button>
            <button class="danger" onclick="deleteItem(${item.id});closeModal()">🗑</button>
        </div>
    `;
    $("modal").style.display="flex";
}
function closeModal(){
    $("modal").style.display="none";
    document.querySelector(".modalBox").style.transform="translateY(0)";
}

/* ===== ZOOM ===== */
function zoomImage(src){
    $("zoomImg").src=src;
    $("zoomOverlay").style.display="flex";
}
function closeZoom(){
    $("zoomOverlay").style.display="none";
}

/* ===== SWIPE DOWN ===== */
let startY=0,currentY=0,isDragging=false;

$("modal").addEventListener("touchstart",e=>{
    startY=e.touches[0].clientY;
    isDragging=true;
});
$("modal").addEventListener("touchmove",e=>{
    if(!isDragging) return;
    currentY=e.touches[0].clientY;
    let diff=currentY-startY;
    if(diff>0){
        document.querySelector(".modalBox").style.transform=`translateY(${diff}px)`;
    }
});
$("modal").addEventListener("touchend",()=>{
    isDragging=false;
    let diff=currentY-startY;
    if(diff>120) closeModal();
    else document.querySelector(".modalBox").style.transform="translateY(0)";
});

/* ===== SCAFFALI ===== */
function aggiungiScaffale(){
    const name = $("shelfName").value.trim();
    if(!name) return alert("Nome obbligatorio");

    let n=$("shelfName").value.trim();
    if(!n) return alert("Nome obbligatorio");
saveState();

    scaffali.push({ nome:name, livelli:1 });

    scaffali.push({nome:n,livelli:1});
$("shelfName").value="";
render();
}

function changeLevels(i,delta){
function changeLevels(i,d){
saveState();

    scaffali[i].livelli += delta;
    if(scaffali[i].livelli < 1) scaffali[i].livelli = 1;

    scaffali[i].livelli=Math.max(1,scaffali[i].livelli+d);
inventario.forEach(o=>{
if(o.shelf===i && o.level>=scaffali[i].livelli){
            o.level = scaffali[i].livelli - 1;

});

function updateLevels(){
