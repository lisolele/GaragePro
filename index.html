<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Pro</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f2f2f7;
}

header{
position:sticky;
top:0;
background:#fff;
border-bottom:1px solid #eee;
z-index:10;
}

.headerBar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 12px;
}

.title{font-weight:700}

/* layout */
.container{padding:12px;max-width:900px;margin:auto}

.section{
background:#fff;
padding:14px;
border-radius:14px;
margin-top:12px;
box-shadow:0 4px 14px rgba(0,0,0,0.04);
}

/* input */
input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:10px;
border:1px solid #ddd;
font-size:13px;
}

button{
background:#007aff;
color:#fff;
border:none;
font-weight:600;
}

.danger{background:#ff3b30}

/* scaffali */
.shelfCard{
margin-top:10px;
padding:10px;
border:1px solid #eee;
border-radius:12px;
}

.levelRow{
display:flex;
gap:6px;
align-items:center;
margin-top:6px;
}

.levelRow input{
flex:1;
border:none;
background:#f5f5f5;
padding:6px;
border-radius:8px;
font-size:12px;
}

/* items */
.itemCard{
display:flex;
gap:10px;
align-items:center;
padding:10px;
border-radius:12px;
border:1px solid #eee;
margin-top:10px;
background:#fff;
}

.itemImg{
width:48px;
height:48px;
background:#eee;
border-radius:10px;
object-fit:cover;
}

.itemInfo{flex:1}

.itemTitle{font-weight:600;font-size:13px}

.itemMeta{font-size:11px;opacity:.7;margin-top:3px}

/* ===== POPUP ===== */
#modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.55);
justify-content:center;
align-items:center;
z-index:9999;
}

.modalBox{
background:#fff;
width:92%;
max-width:420px;
border-radius:16px;
padding:14px;
}

.modalImg{
width:100%;
border-radius:12px;
margin-top:10px;
cursor:zoom-in;
}

/* ===== ZOOM ===== */
#zoom{
display:none;
position:fixed;
inset:0;
background:black;
z-index:10000;
justify-content:center;
align-items:center;
}

#zoom img{
max-width:100%;
max-height:100%;
}
</style>
</head>

<body>

<header>
<div class="headerBar">
<div class="title">🚗 Garage Pro</div>
</div>
</header>

<div class="container">

<!-- ===== SCAFFALI ===== -->
<div class="section">
<h3>Scaffali</h3>

<input id="shelfName" placeholder="Nome scaffale">
<button onclick="addShelf()">Crea scaffale</button>

<div id="shelfView"></div>
</div>

<!-- ===== OGGETTI ===== -->
<div class="section">
<h3>Oggetti</h3>

<input id="nome" placeholder="Nome">
<input id="categoria" placeholder="Categoria">
<input id="img" placeholder="URL immagine (opzionale)">

<select id="selectShelf"></select>
<select id="selectLevel"></select>

<button onclick="addItem()">Aggiungi oggetto</button>
</div>

<!-- ===== LISTA ===== -->
<div class="section">
<h3>Lista</h3>
<div id="items"></div>
</div>

</div>

<!-- ===== MODAL ===== -->
<div id="modal" onclick="closeModal()">
<div class="modalBox" onclick="event.stopPropagation()">

<h3 id="mTitle"></h3>
<div id="mCat"></div>

<img id="mImg" class="modalImg" onclick="openZoom(this.src)">

</div>
</div>

<!-- ===== ZOOM ===== -->
<div id="zoom" onclick="closeZoom()">
<img id="zoomImg">
</div>

<script>

/* ===== STATE ===== */
let inventario = JSON.parse(localStorage.getItem("inv")) || [];
let scaffali = JSON.parse(localStorage.getItem("shel")) || [];

const $ = id => document.getElementById(id);

/* ===== SAVE ===== */
function save(){
localStorage.setItem("inv", JSON.stringify(inventario));
localStorage.setItem("shel", JSON.stringify(scaffali));
}

/* ===== SCAFFALI ===== */
function addShelf(){

let n=$("shelfName").value.trim();
if(!n) return;

scaffali.push({
nome:n,
livelli:[{nome:"Ripiano 1"}]
});

$("shelfName").value="";

render();
}

/* ===== LIVELLI ===== */
function updateSelectors(){

let s=$("selectShelf");
s.innerHTML="";

if(scaffali.length===0){
scaffali.push({nome:"Default",livelli:[{nome:"Ripiano 1"}]});
}

scaffali.forEach((sh,i)=>{
s.innerHTML+=`<option value="${i}">${sh.nome}</option>`;
});

updateLevels();
}

function updateLevels(){

let i=Number($("selectShelf").value);

let l=$("selectLevel");
l.innerHTML="";

if(!scaffali[i]) return;

scaffali[i].livelli.forEach((lv,idx)=>{
l.innerHTML+=`<option value="${idx}">${lv.nome}</option>`;
});
}

$("selectShelf").onchange=updateLevels;

/* ===== OGGETTI ===== */
function addItem(){

let nome=$("nome").value.trim();
if(!nome) return;

inventario.push({
id:Date.now(),
nome,
categoria:$("categoria").value,
img:$("img").value || "",
shelf:Number($("selectShelf").value),
level:Number($("selectLevel").value)
});

$("nome").value="";
$("categoria").value="";
$("img").value="";

render();
}

/* ===== LISTA ===== */
function renderItems(){

let c=$("items");
c.innerHTML="";

inventario.forEach(i=>{

let shelf=scaffali[i.shelf]?.nome||"-";
let level=scaffali[i.shelf]?.livelli?.[i.level]?.nome||"-";

let d=document.createElement("div");
d.className="itemCard";
d.onclick=()=>openModal(i);

d.innerHTML=`
${i.img?`<img src="${i.img}" class="itemImg">`:`<div class="itemImg"></div>`}

<div class="itemInfo">
<div class="itemTitle">${i.nome}</div>
<div class="itemMeta">${i.categoria||"-"} • ${shelf} • ${level}</div>
</div>
`;

c.appendChild(d);
});
}

/* ===== MODAL ===== */
function openModal(i){

$("mTitle").textContent=i.nome;
$("mCat").textContent=i.categoria||"";

if(i.img){
$("mImg").src=i.img;
$("mImg").style.display="block";
}else{
$("mImg").style.display="none";
}

$("modal").style.display="flex";
}

function closeModal(){
$("modal").style.display="none";
}

/* ===== ZOOM ===== */
function openZoom(src){
$("zoomImg").src=src;
$("zoom").style.display="flex";
}

function closeZoom(){
$("zoom").style.display="none";
}

/* ===== RENDER ===== */
function render(){
renderItems();
updateSelectors();
}

render();

</script>

</body>
</html>
