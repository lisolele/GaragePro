<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Garage Pro</title>

<style>

body{
    margin:0;
    font-family:-apple-system, sans-serif;
    background:#f2f2f7;
}

header{
    padding:16px;
    text-align:center;
    background:white;
    font-weight:700;
    position:sticky;
    top:0;
}

.container{padding:14px; max-width:900px; margin:auto;}

.section{
    background:white;
    padding:14px;
    margin-top:14px;
    border-radius:18px;
}

input,select,button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:12px;
    border:1px solid #ddd;
}

button{
    background:#007aff;
    color:white;
    border:none;
}

.danger{ background:#ff3b30; }

/* SCAFFALI */

.shelfGrid{
    display:flex;
    gap:12px;
    overflow-x:auto;
}

.shelf{
    min-width:280px;
    background:#f9f9fb;
    border-radius:18px;
    padding:12px;
}

.shelfHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.level{
    background:white;
    margin-top:10px;
    padding:10px;
    border-radius:12px;
    border:1px solid #eee;
}

.small{ font-size:11px; opacity:0.6; }

</style>
</head>

<body>

<header>🚗 Garage Pro</header>

<div class="container">

<!-- OGGETTI -->
<div class="section">
<h3>📦 Oggetti</h3>

<input id="nome" placeholder="Nome">
<input id="categoria" placeholder="Categoria">

<select id="selectShelf"></select>
<select id="selectLevel"></select>

<button onclick="salva()">Salva oggetto</button>
</div>

<!-- SCAFFALI -->
<div class="section">
<h3>🗄️ Scaffali</h3>

<input id="shelfName" placeholder="Nome scaffale">
<button onclick="aggiungiScaffale()">Crea scaffale</button>

<div id="shelfView" class="shelfGrid"></div>
</div>

<!-- LISTA -->
<div class="section">
<h3>📋 Oggetti</h3>
<div id="items"></div>
</div>

</div>

<script>

/* ================= STATE ================= */

let inventario = [];
let scaffali = [];

let undoStack = [];
let redoStack = [];

const $ = id => document.getElementById(id);

/* ================= SAVE ================= */

function save(){
    localStorage.setItem("g1", JSON.stringify(inventario));
    localStorage.setItem("g2", JSON.stringify(scaffali));
}

/* ================= SNAPSHOT ================= */

function saveState(){
    undoStack.push({
        inventario: structuredClone(inventario),
        scaffali: structuredClone(scaffali)
    });
    redoStack = [];
}

/* ================= UNDO / REDO ================= */

function undo(){
    if(!undoStack.length) return;

    redoStack.push(structuredClone({inventario,scaffali}));

    const s = undoStack.pop();
    inventario = s.inventario;
    scaffali = s.scaffali;

    save();
    render();
}

function redo(){
    if(!redoStack.length) return;

    undoStack.push(structuredClone({inventario,scaffali}));

    const s = redoStack.pop();
    inventario = s.inventario;
    scaffali = s.scaffali;

    save();
    render();
}

/* ================= SCAFFALI ================= */

function aggiungiScaffale(){
    saveState();

    scaffali.push({
        nome:$("shelfName").value,
        livelli:1
    });

    render();
}

/* ✏️ EDIT SCAFFALE */
function editShelf(si){

    const azione = prompt("Azioni: +1 / -1 / rename");

    if(!azione) return;

    saveState();

    if(azione === "+1"){
        scaffali[si].livelli++;

    } else if(azione === "-1" && scaffali[si].livelli>1){

        scaffali[si].livelli--;

        inventario.forEach(i=>{
            if(i.shelf==si && i.level>=scaffali[si].livelli){
                i.level=null;
            }
        });

    } else if(azione === "rename"){
        const n = prompt("Nuovo nome");
        if(n) scaffali[si].nome = n;
    }

    render();
}

/* ================= ITEMS ================= */

function salva(){

    saveState();

    inventario.push({
        id:Date.now(),
        nome:$("nome").value,
        categoria:$("categoria").value,
        shelf:$("selectShelf").value,
        level:$("selectLevel").value
    });

    render();
}

/* ================= RENDER ================= */

function render(){

    renderShelves();
    renderItems();
    updateSelectors();
}

/* ================= SHELVES ================= */

function renderShelves(){

    const c=$("shelfView");
    c.innerHTML="";

    scaffali.forEach((s,si)=>{

        const div=document.createElement("div");
        div.className="shelf";

        div.innerHTML=`
            <div class="shelfHeader">
                <b>${s.nome}</b>
                <button onclick="editShelf(${si})">✏️</button>
            </div>
        `;

        for(let li=0; li<s.livelli; li++){

            const lv=document.createElement("div");
            lv.className="level";

            const items = inventario.filter(i=>i.shelf==si && i.level==li);

            lv.innerHTML=`
                <div style="display:flex;justify-content:space-between;">
                    <div class="small">Ripiano ${li+1}</div>
                </div>

                <div>
                    ${items.map(o=>"• "+o.nome).join("<br>")||"<span class='small'>(vuoto)</span>"}
                </div>
            `;

            div.appendChild(lv);
        }

        c.appendChild(div);
    });
}

/* ================= ITEMS ================= */

function renderItems(){

    const c=$("items");
    c.innerHTML="";

    inventario.forEach(i=>{

        const div=document.createElement("div");
        div.innerHTML=`
            <b>${i.nome}</b>
        `;

        c.appendChild(div);
    });
}

/* ================= SELECT ================= */

function updateSelectors(){

    const s=$("selectShelf");
    s.innerHTML="";

    scaffali.forEach((sh,i)=>{
        s.innerHTML+=`<option value="${i}">${sh.nome}</option>`;
    });
}

/* ================= INIT ================= */

render();

</script>

</body>
</html>
