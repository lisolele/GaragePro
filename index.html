<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Pro</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f2f2f7;
}

/* HEADER */
header{
position:sticky;
top:0;
background:#fff;
border-bottom:1px solid #eee;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 12px;
font-weight:700;
}

.actions{
display:flex;
gap:6px;
}

.actions button{
width:auto;
padding:4px 8px;
font-size:12px;
border-radius:8px;
background:#1c1c1e;
color:#fff;
border:none;
cursor:pointer;
}

/* layout */
.container{padding:12px;max-width:900px;margin:auto}

.section{
background:#fff;
padding:14px;
border-radius:14px;
margin-top:12px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:10px;
border:1px solid #ddd;
}

button{
background:#007aff;
color:#fff;
border:none;
font-weight:600;
}

/* items */
.item{
display:flex;
gap:10px;
align-items:center;
padding:10px;
border:1px solid #eee;
border-radius:12px;
margin-top:10px;
background:#fff;
cursor:pointer;
}

.item img{
width:50px;height:50px;
border-radius:10px;
object-fit:cover;
background:#eee;
}

/* modal */
#modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
}

.box{
background:#fff;
padding:14px;
border-radius:14px;
width:90%;
max-width:420px;
}

.box img{
width:100%;
border-radius:10px;
margin-top:10px;
cursor:zoom-in;
}

/* zoom */
#zoom{
display:none;
position:fixed;
inset:0;
background:#000;
justify-content:center;
align-items:center;
}

#zoom img{
max-width:100%;
max-height:100%;
}
</style>
</head>

<body>

<header>
<div>🚗 Garage Pro</div>

<div class="actions">
<button onclick="undo()">↩</button>
<button onclick="redo()">↪</button>
</div>
</header>

<div class="container">

<div class="section">
<h3>Scaffali</h3>
<input id="shelfName" placeholder="Nome scaffale">
<button onclick="addShelf()">Crea</button>
<div id="shelfView"></div>
</div>

<div class="section">
<h3>Oggetti</h3>

<input id="itemName" placeholder="Nome">
<input id="itemCat" placeholder="Categoria">

<input type="file" id="fileImg" accept="image/*">
<img id="preview" style="width:60px;display:none;margin-top:6px;border-radius:8px">

<select id="shelfSelect"></select>
<select id="levelSelect"></select>

<button onclick="addItem()">Aggiungi</button>
</div>

<div class="section">
<h3>Lista</h3>
<div id="items"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
<div class="box" onclick="event.stopPropagation()">
<h3 id="mTitle"></h3>
<div id="mCat"></div>
<img id="mImg" onclick="zoom(this.src)">
</div>
</div>

<!-- ZOOM -->
<div id="zoom" onclick="closeZoom()">
<img id="zoomImg">
</div>

<script>

/* ================= STATE ================= */

let state = {
scaffali: JSON.parse(localStorage.getItem("shel")) || [],
inventario: JSON.parse(localStorage.getItem("inv")) || []
};

let undoStack = [];
let redoStack = [];

const $ = id => document.getElementById(id);

/* ================= SNAPSHOT ENGINE ================= */

function snapshot(){
return JSON.stringify(state);
}

function restore(s){
state = JSON.parse(s);
}

/* salva in history prima di ogni modifica */
function pushUndo(){
undoStack.push(snapshot());
redoStack = [];
}

/* ================= SAVE ================= */

function save(){
localStorage.setItem("shel", JSON.stringify(state.scaffali));
localStorage.setItem("inv", JSON.stringify(state.inventario));
}

/* ================= UNDO / REDO ================= */

function undo(){
if(!undoStack.length) return;

redoStack.push(snapshot());
restore(undoStack.pop());

save();
render();
}

function redo(){
if(!redoStack.length) return;

undoStack.push(snapshot());
restore(redoStack.pop());

save();
render();
}

/* ================= IMAGE ================= */

function fileToBase64(file){
return new Promise(res=>{
const r = new FileReader();
r.onload = ()=>res(r.result);
r.readAsDataURL(file);
});
}

/* preview */
$("fileImg").onchange = e=>{
let f = e.target.files[0];
if(!f) return;
$("preview").src = URL.createObjectURL(f);
$("preview").style.display="block";
};

/* ================= SCAFFALI ================= */

function addShelf(){
const name = $("shelfName").value.trim();
if(!name) return;

pushUndo();

state.scaffali.push({
nome:name,
livelli:[{nome:"Ripiano 1"}]
});

$("shelfName").value="";
save();
render();
}

/* ================= OGGETTI ================= */

async function addItem(){

const name = $("itemName").value.trim();
if(!name) return;

pushUndo();

let img = "";
const file = $("fileImg").files[0];
if(file) img = await fileToBase64(file);

state.inventario.push({
id:Date.now(),
nome:name,
categoria:$("itemCat").value,
img,
shelf:Number($("shelfSelect").value),
level:Number($("levelSelect").value)
});

$("itemName").value="";
$("itemCat").value="";
$("fileImg").value="";
$("preview").style.display="none";

save();
render();
}

/* ================= MODAL ================= */

function openModal(i){
$("mTitle").textContent=i.nome;
$("mCat").textContent=i.categoria||"-";

if(i.img){
$("mImg").src=i.img;
$("mImg").style.display="block";
}else{
$("mImg").style.display="none";
}

$("modal").style.display="flex";
}

function closeModal(){
$("modal").style.display="none";
}

/* ================= ZOOM ================= */

function zoom(src){
$("zoomImg").src=src;
$("zoom").style.display="flex";
}

function closeZoom(){
$("zoom").style.display="none";
}

/* ================= RENDER ================= */

function render(){

let s = $("shelfView");
s.innerHTML="";

state.scaffali.forEach(sh=>{
s.innerHTML += `<div><b>${sh.nome}</b></div>`;
});

let c = $("items");
c.innerHTML="";

state.inventario.forEach(i=>{

const div = document.createElement("div");
div.className="item";
div.onclick=()=>openModal(i);

div.innerHTML=`
${i.img ? `<img src="${i.img}">` : `<div style="width:50px;height:50px;background:#eee;border-radius:10px"></div>`}
<div>
<b>${i.nome}</b><br>
<small>${i.categoria||"-"}</small>
</div>
`;

c.appendChild(div);
});

let sel = $("shelfSelect");
sel.innerHTML="";

state.scaffali.forEach((s,i)=>{
sel.innerHTML += `<option value="${i}">${s.nome}</option>`;
});

updateLevels();
}

function updateLevels(){
let i = Number($("shelfSelect").value);
let l = $("levelSelect");

l.innerHTML="";

if(!state.scaffali[i]) return;

state.scaffali[i].livelli.forEach((x,idx)=>{
l.innerHTML += `<option value="${idx}">${x.nome}</option>`;
});
}

$("shelfSelect").onchange = updateLevels;

/* ================= INIT ================= */

render();

</script>

</body>
</html>
