<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Pro</title>

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background:#f2f2f7;
}

header{
    padding:16px;
    text-align:center;
    background:white;
    font-weight:700;
    position:sticky;
    top:0;
    z-index:10;
    border-bottom:1px solid #eee;
}

.container{
    padding:14px;
    max-width:900px;
    margin:auto;
}

.section{
    background:white;
    padding:18px;
    margin-top:14px;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,0.04);
}

input,select,button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:15px;
}

button{
    background:#007aff;
    color:white;
    border:none;
    font-weight:600;
    cursor:pointer;
}

.danger{ background:#ff3b30; }

.shelfGrid{
    display:flex;
    gap:12px;
    overflow-x:auto;
}

.shelf{
    min-width:280px;
    background:#f9f9fb;
    border-radius:18px;
    padding:12px;
}

.shelfHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

.level{
    background:white;
    margin-top:10px;
    padding:10px;
    border-radius:12px;
    border:1px solid #eee;
}

.small{
    font-size:11px;
    opacity:0.6;
}

#items div{
    background:white;
    padding:10px;
    margin-top:8px;
    border-radius:12px;
    border:1px solid #eee;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

mark{
    background:#ffe066;
    padding:2px 4px;
    border-radius:6px;
}

#undoBar{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#1c1c1e;
    color:white;
    padding:10px 12px;
    border-radius:14px;
    display:flex;
    gap:10px;
    z-index:999;
}
</style>
</head>

<body>

<header>🚗 Garage Pro</header>

<div class="container">

<div class="section">
<h3>🗄️ Scaffali</h3>
<input id="shelfName" placeholder="Nome scaffale">
<button onclick="aggiungiScaffale()">Crea scaffale</button>
<div id="shelfView" class="shelfGrid"></div>
</div>

<div class="section">
<h3>📦 Oggetti</h3>

<input id="search" placeholder="🔍 Cerca..." oninput="renderItems()">

<input id="nome" placeholder="Nome">
<input id="categoria" placeholder="Categoria">

<select id="selectShelf"></select>
<select id="selectLevel"></select>

<button onclick="salva()">Salva oggetto</button>
</div>

<div class="section">
<h3>📋 Oggetti</h3>
<div id="items"></div>
</div>

</div>

<div id="undoBar">
<button onclick="undo()">↩️ Undo</button>
<button onclick="redo()">↪️ Redo</button>
</div>

<script>

/* ===== SAFE LOAD ===== */
let inventario = [];
let scaffali = [];

try {
    inventario = JSON.parse(localStorage.getItem("inv")) || [];
    scaffali = JSON.parse(localStorage.getItem("shel")) || [];
} catch {}

/* ===== STATE ===== */
let undoStack = [];
let redoStack = [];

const $ = id => document.getElementById(id);

/* ===== SAVE ===== */
function save(){
    localStorage.setItem("inv", JSON.stringify(inventario));
    localStorage.setItem("shel", JSON.stringify(scaffali));
}

/* ===== STATE SNAPSHOT ===== */
function saveState(){
    undoStack.push({
        inventario: structuredClone(inventario),
        scaffali: structuredClone(scaffali)
    });
    redoStack = [];
}

/* ===== UNDO / REDO ===== */
function undo(){
    if(!undoStack.length) return;

    redoStack.push(structuredClone({inventario,scaffali}));

    const s = undoStack.pop();
    inventario = s.inventario;
    scaffali = s.scaffali;

    save();
    render();
}

function redo(){
    if(!redoStack.length) return;

    undoStack.push(structuredClone({inventario,scaffali}));

    const s = redoStack.pop();
    inventario = s.inventario;
    scaffali = s.scaffali;

    save();
    render();
}

/* ===== ESCAPE HTML ===== */
function escapeHTML(str){
    return String(str).replace(/[&<>"']/g, m => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#039;'
    }[m]));
}

/* ===== HIGHLIGHT SAFE ===== */
function escapeRegExp(string){
    return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(text, query){
    if(!query) return escapeHTML(text);

    const safe = escapeRegExp(query);
    const regex = new RegExp(`(${safe})`, "gi");

    return escapeHTML(text).replace(regex, "<mark>$1</mark>");
}

/* ===== SCAFFALI ===== */
function aggiungiScaffale(){
    const name = $("shelfName").value.trim();
    if(!name) return alert("Nome obbligatorio");

    saveState();

    scaffali.push({ nome:name, livelli:1 });

    $("shelfName").value="";
    render();
}

function changeLevels(i,delta){
    saveState();

    scaffali[i].livelli += delta;
    if(scaffali[i].livelli < 1) scaffali[i].livelli = 1;

    inventario.forEach(o=>{
        if(o.shelf===i && o.level>=scaffali[i].livelli){
            o.level = scaffali[i].livelli - 1;
        }
    });

    render();
}

/* ===== OGGETTI ===== */
function salva(){

    const nome = $("nome").value.trim();
    if(!nome) return alert("Nome obbligatorio");

    const shelf = $("selectShelf").value;
    const level = $("selectLevel").value;

    if(shelf==="" || level===""){
        return alert("Seleziona scaffale e ripiano");
    }

    saveState();

    inventario.push({
        id:Date.now(),
        nome,
        categoria:$("categoria").value,
        shelf:Number(shelf),
        level:Number(level)
    });

    $("nome").value="";
    $("categoria").value="";
    $("selectLevel").value="";

    render();
}

function editItem(id){

    const i = inventario.find(x=>x.id==id);
    if(!i) return;

    saveState();

    $("nome").value=i.nome;
    $("categoria").value=i.categoria;

    $("selectShelf").value=i.shelf;
    updateLevels();
    $("selectLevel").value=i.level;

    inventario = inventario.filter(x=>x.id!=id);

    render();
}

function deleteItem(id){
    saveState();
    inventario = inventario.filter(i=>i.id!=id);
    render();
}

/* ===== RENDER ITEMS ===== */
function renderItems(){

    const c = $("items");
    c.innerHTML="";

    const q = $("search").value.trim().toLowerCase();

    inventario
    .filter(i=>{
        if(!q) return true;
        return (i.nome||"").toLowerCase().includes(q) ||
               (i.categoria||"").toLowerCase().includes(q);
    })
    .forEach(i=>{

        const div=document.createElement("div");

        div.innerHTML=`
            <div>
                <b>${highlight(i.nome,q)}</b><br>
                <span class="small">${highlight(i.categoria||"",q)}</span>
            </div>

            <div style="display:flex;gap:6px;">
                <button onclick="editItem(${i.id})">✏️</button>
                <button onclick="deleteItem(${i.id})" class="danger">🗑</button>
            </div>
        `;

        c.appendChild(div);
    });
}

/* ===== RENDER SCAFFALI ===== */
function renderShelves(){

    const c=$("shelfView");
    c.innerHTML="";

    scaffali.forEach((s,i)=>{

        const div=document.createElement("div");
        div.className="shelf";

        div.innerHTML=`
            <div class="shelfHeader">
                <input value="${escapeHTML(s.nome)}"
                    style="border:none;background:transparent;font-weight:700;width:60%;"
                    oninput="scaffali[${i}].nome=this.value; save();"
                >

                <div style="display:flex;gap:6px;">
                    <button onclick="changeLevels(${i},1)">+</button>
                    <button onclick="changeLevels(${i},-1)" class="danger">-</button>
                </div>
            </div>
        `;

        for(let l=0;l<s.livelli;l++){

            const lv=document.createElement("div");
            lv.className="level";

            const items = inventario.filter(o=>o.shelf===i && o.level===l);

            lv.innerHTML=`
                <div class="small">Ripiano ${l+1}</div>
                <div>
                    ${items.map(o=>"• "+escapeHTML(o.nome)).join("<br>") || "<span class='small'>(vuoto)</span>"}
                </div>
            `;

            div.appendChild(lv);
        }

        c.appendChild(div);
    });
}

/* ===== SELECT ===== */
function updateSelectors(){

    const s=$("selectShelf");
    const l=$("selectLevel");

    s.innerHTML="";

    if(scaffali.length===0){
        s.innerHTML="<option value=''>-- nessuno --</option>";
        l.innerHTML="<option value=''>--</option>";
        return;
    }

    scaffali.forEach((sh,i)=>{
        s.innerHTML+=`<option value="${i}">${escapeHTML(sh.nome)}</option>`;
    });

    updateLevels();
}

function updateLevels(){

    const i=$("selectShelf").value;
    const l=$("selectLevel");

    l.innerHTML="";

    if(!scaffali[i]){
        l.innerHTML="<option value=''>--</option>";
        return;
    }

    for(let j=0;j<scaffali[i].livelli;j++){
        l.innerHTML+=`<option value="${j}">Ripiano ${j+1}</option>`;
    }
}

$("selectShelf").addEventListener("change", updateLevels);

/* ===== INIT ===== */
function render(){
    renderShelves();
    renderItems();
    updateSelectors();
}

render();
</script>

</body>
</html>
