<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Pro 3D</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f2f2f7;
}

header{
    position:fixed;
    top:0;
    width:100%;
    padding:10px;
    text-align:center;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(10px);
    font-weight:600;
    z-index:10;
}

#ui{
    position:fixed;
    top:60px;
    left:10px;
    width:260px;
    background:white;
    padding:10px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    z-index:10;
}

input,button{
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:8px;
    border:1px solid #ddd;
}

button{
    background:#007aff;
    color:white;
    border:none;
    font-weight:600;
}

#scene{
    width:100vw;
    height:100vh;
    display:block;
}
</style>
</head>

<body>

<header>🚗 Garage Pro 3D Warehouse</header>

<div id="ui">

<h3>🗄️ Scaffali</h3>
<input id="shelfName" placeholder="Nome scaffale">
<button onclick="addShelf()">Crea scaffale</button>

<h3>📦 Oggetti</h3>
<input id="itemName" placeholder="Nome oggetto">
<button onclick="addItem()">Aggiungi oggetto</button>

<p style="font-size:12px;opacity:0.6">
Click su oggetti per selezionarli
</p>

</div>

<canvas id="scene"></canvas>

<script>

let scene, camera, renderer;
let shelves = [];
let items = [];
let selected = null;

init();
animate();

function init(){

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf2f2f7);

    camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth/window.innerHeight,
        0.1,
        1000
    );

    camera.position.set(0,6,10);

    renderer = new THREE.WebGLRenderer({
        canvas:document.getElementById("scene"),
        antialias:true
    });

    renderer.setSize(window.innerWidth,window.innerHeight);

    // LUCE
    const light = new THREE.DirectionalLight(0xffffff,1);
    light.position.set(5,10,5);
    scene.add(light);

    scene.add(new THREE.AmbientLight(0xffffff,0.4));

    // GRIGLIA MAGAZZINO
    const grid = new THREE.GridHelper(20,20);
    scene.add(grid);

    window.addEventListener("click", onClick);
}

// 📦 SCAFFALE
function addShelf(){

    const geo = new THREE.BoxGeometry(3,1,1);
    const mat = new THREE.MeshStandardMaterial({color:0x888888});

    const shelf = new THREE.Mesh(geo,mat);

    shelf.position.x = Math.random()*6-3;
    shelf.position.z = Math.random()*6-3;

    shelf.userData = {
        type:"shelf",
        name:shelfName.value || "Scaffale"
    };

    scene.add(shelf);
    shelves.push(shelf);
}

// 📦 OGGETTO
function addItem(){

    const geo = new THREE.SphereGeometry(0.3,16,16);
    const mat = new THREE.MeshStandardMaterial({color:0x007aff});

    const item = new THREE.Mesh(geo,mat);

    item.position.x = Math.random()*6-3;
    item.position.z = Math.random()*6-3;

    item.userData = {
        type:"item",
        name:itemName.value || "Oggetto"
    };

    scene.add(item);
    items.push(item);
}

// 🖱️ CLICK SELECT
function onClick(event){

    const mouse = new THREE.Vector2();
    mouse.x = (event.clientX/window.innerWidth)*2-1;
    mouse.y = -(event.clientY/window.innerHeight)*2+1;

    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse,camera);

    const objects = [...shelves,...items];

    const intersects = raycaster.intersectObjects(objects);

    if(intersects.length > 0){

        const obj = intersects[0].object;

        if(selected){
            selected.material.emissive?.set(0x000000);
        }

        selected = obj;

        if(obj.material.emissive){
            obj.material.emissive.set(0x333333);
        }

        console.log("Selezionato:", obj.userData.name);
    }
}

// 🎮 LOOP
function animate(){

    requestAnimationFrame(animate);

    // rotazione leggera scena (effetto “gioco”)
    scene.rotation.y += 0.001;

    renderer.render(scene,camera);
}

// resize
window.addEventListener("resize",()=>{

    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
