<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Pro iOS</title>

<style>
body{
    margin:0;
    font-family:-apple-system, sans-serif;
    background:#f2f2f7;
}

header{
    padding:16px;
    text-align:center;
    background:white;
    font-weight:600;
    position:sticky;
    top:0;
}

.container{padding:12px; max-width:1000px; margin:auto;}

.section{
    background:white;
    padding:12px;
    margin-top:12px;
    border-radius:12px;
}

input,select,button{
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    background:#007aff;
    color:white;
    border:none;
}

.danger{
    background:#ff3b30;
}

.shelfGrid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:10px;
}

.shelf{
    background:#f5f5f7;
    padding:10px;
    border-radius:12px;
}

.level{
    background:white;
    margin-top:6px;
    padding:6px;
    border-radius:8px;
    border:1px dashed #ccc;
    position:relative;
}

.levelDelete{
    position:absolute;
    right:4px;
    top:4px;
    font-size:10px;
    padding:2px 6px;
}

.item{
    background:white;
    padding:6px;
    margin-top:6px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    font-size:12px;
}

.item img{
    width:26px;
    height:26px;
    border-radius:5px;
    object-fit:cover;
}

.small{font-size:10px; opacity:0.6;}

</style>
</head>

<body>

<header>🚗 Garage Pro iOS</header>

<div class="container">

<!-- OGGETTI -->
<div class="section">
<h3>📦 Oggetti</h3>

<input id="nome" placeholder="Nome">
<input id="categoria" placeholder="Categoria">
<input id="quantita" type="number" placeholder="Quantità">
<input type="file" id="itemImg">

<select id="selectShelf"></select>
<select id="selectLevel"></select>

<button onclick="salva()">Salva oggetto</button>
</div>

<!-- SCAFFALI -->
<div class="section">
<h3>🗄️ Scaffali</h3>

<input id="shelfName" placeholder="Nome scaffale">
<input id="levels" type="number" placeholder="Ripiani" value="1">

<button onclick="aggiungiScaffale()">Crea scaffale</button>

<div id="shelfView" class="shelfGrid"></div>
</div>

<!-- LISTA OGGETTI -->
<div class="section">
<h3>📋 Lista oggetti</h3>
<div id="items"></div>
</div>

</div>

<script>

let inventario = JSON.parse(localStorage.getItem("garage_drag")) || [];
let scaffali = JSON.parse(localStorage.getItem("garage_shelves")) || [];

let editingItemId = null;
let itemImgData = null;

// helper iOS safe
const $ = id => document.getElementById(id);

function save(){
    localStorage.setItem("garage_drag", JSON.stringify(inventario));
    localStorage.setItem("garage_shelves", JSON.stringify(scaffali));
}

// ===== IMMAGINI =====
$("itemImg").onchange = e=>{
    const f = e.target.files[0];
    if(!f) return;

    const r = new FileReader();
    r.onload = ev => itemImgData = ev.target.result;
    r.readAsDataURL(f);
};

// ===== SCAFFALI =====

function aggiungiScaffale(){

    const nome = $("shelfName").value.trim();
    const livelli = parseInt($("levels").value || "1");

    if(!nome){
        alert("Inserisci nome scaffale");
        return;
    }

    scaffali.push({ nome, livelli });

    save();
    renderShelves();
    updateSelectors();

    $("shelfName").value = "";
    $("levels").value = 1;
}

function deleteShelf(si){

    scaffali.splice(si,1);

    inventario.forEach(i=>{
        if(i.shelf == si){
            i.shelf = null;
            i.level = null;
        }
    });

    save();
    renderShelves();
    renderItems();
    updateSelectors();
}

function deleteLevel(si,li){

    scaffali[si].livelli--;

    inventario.forEach(i=>{
        if(i.shelf == si && i.level == li){
            i.level = null;
        }
        if(i.shelf == si && i.level > li){
            i.level--;
        }
    });

    save();
    renderShelves();
    renderItems();
    updateSelectors();
}

// ⭐ RENDER SCAFFALI CON OGGETTI DENTRO
function renderShelves(){

    const c = $("shelfView");
    c.innerHTML = "";

    scaffali.forEach((s,si)=>{

        const div = document.createElement("div");
        div.className = "shelf";

        div.innerHTML = `
            <b>${s.nome}</b>
            <button class="danger" onclick="deleteShelf(${si})">🗑</button>
        `;

        for(let li=0; li<s.livelli; li++){

            const lv = document.createElement("div");
            lv.className = "level";

            const oggetti = inventario.filter(i =>
                String(i.shelf) === String(si) &&
                String(i.level) === String(li)
            );

            let html = `<div class="small">Ripiano ${li+1}</div>`;

            if(oggetti.length === 0){
                html += `<div class="small">(vuoto)</div>`;
            }

            oggetti.forEach(o=>{
                html += `
                    <div style="display:flex;gap:5px;align-items:center;">
                        ${o.img ? `<img src="${o.img}" width="20">` : ""}
                        <span style="font-size:11px;">${o.nome}</span>
                    </div>
                `;
            });

            lv.innerHTML = html;

            const del = document.createElement("button");
            del.className = "levelDelete";
            del.innerText = "✖";
            del.onclick = ()=>deleteLevel(si,li);

            lv.appendChild(del);

            lv.ondragover = e=>e.preventDefault();
            lv.ondrop = e=>dropItem(e,si,li);

            div.appendChild(lv);
        }

        c.appendChild(div);
    });
}

// ===== OGGETTI =====

function salva(){

    const nome = $("nome").value.trim();

    if(!nome){
        alert("Nome obbligatorio");
        return;
    }

    if(editingItemId){

        const i = inventario.find(x=>x.id==editingItemId);
        if(i){
            i.nome = nome;
            i.categoria = $("categoria").value;
            i.quantita = $("quantita").value;
            i.shelf = $("selectShelf").value;
            i.level = $("selectLevel").value;
        }

        editingItemId = null;

    } else {

        inventario.push({
            id:Date.now(),
            nome,
            categoria:$("categoria").value,
            quantita:$("quantita").value,
            img:itemImgData,
            shelf:$("selectShelf").value,
            level:$("selectLevel").value
        });
    }

    save();
    renderItems();
    renderShelves();
}

// DROP
function dropItem(e,si,li){

    const id = e.dataTransfer.getData("id");

    inventario.forEach(i=>{
        if(i.id == id){
            i.shelf = si;
            i.level = li;
        }
    });

    save();
    renderItems();
    renderShelves();
}

// RENDER ITEMS
function renderItems(){

    const c = $("items");
    c.innerHTML = "";

    inventario.forEach(i=>{

        const div = document.createElement("div");
        div.className = "item";
        div.draggable = true;

        div.ondragstart = e=>e.dataTransfer.setData("id",i.id);

        div.innerHTML = `
            <div>
                ${i.img ? `<img src="${i.img}">` : ""}
                <b>${i.nome}</b>
            </div>
            <div>
                <button onclick="editItem(${i.id})">✏️</button>
                <button onclick="deleteItem(${i.id})">🗑</button>
            </div>
        `;

        c.appendChild(div);
    });
}

function editItem(id){
    const i = inventario.find(x=>x.id==id);
    if(!i) return;

    $("nome").value = i.nome;
    $("categoria").value = i.categoria;
    $("quantita").value = i.quantita;

    $("selectShelf").value = i.shelf;
    updateLevels();
    $("selectLevel").value = i.level;

    editingItemId = id;
}

function deleteItem(id){
    inventario = inventario.filter(i=>i.id!=id);
    save();
    renderItems();
    renderShelves();
}

// ===== DROPDOWN =====

function updateSelectors(){

    const s = $("selectShelf");
    s.innerHTML = "";

    scaffali.forEach((sh,i)=>{
        const o = document.createElement("option");
        o.value = i;
        o.text = sh.nome;
        s.appendChild(o);
    });

    updateLevels();
}

function updateLevels(){

    const i = $("selectShelf").value;
    const lv = $("selectLevel");

    lv.innerHTML = "";

    if(!scaffali[i]) return;

    for(let j=0;j<scaffali[i].livelli;j++){
        const o = document.createElement("option");
        o.value = j;
        o.text = "Ripiano " + (j+1);
        lv.appendChild(o);
    }
}

$("selectShelf").onchange = updateLevels;

// INIT
renderShelves();
renderItems();
updateSelectors();

</script>

</body>
</html>
