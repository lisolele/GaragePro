<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f2f2f7;
}

/* HEADER */
header{
position:sticky;
top:0;
background:#fff;
border-bottom:1px solid #eee;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 12px;
font-weight:700;
z-index:10;
}

.actions{
display:flex;
gap:6px;
align-items:center;
}

.actions button{
width:auto;
padding:4px 8px;
font-size:12px;
border-radius:8px;
background:#1c1c1e;
color:#fff;
border:none;
cursor:pointer;
}

/* LAYOUT */
.container{padding:12px;max-width:900px;margin:auto}

.section{
background:#fff;
padding:14px;
border-radius:14px;
margin-top:12px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:10px;
border:1px solid #ddd;
}

button{
background:#007aff;
color:#fff;
border:none;
font-weight:600;
}

/* ITEMS */
.item{
display:flex;
gap:10px;
align-items:center;
padding:10px;
border:1px solid #eee;
border-radius:12px;
margin-top:10px;
background:#fff;
cursor:pointer;
}

.item img{
width:50px;
height:50px;
border-radius:10px;
object-fit:cover;
background:#eee;
}

/* MODAL */
#modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
z-index:20;
}

.box{
background:#fff;
padding:14px;
border-radius:14px;
width:90%;
max-width:420px;
}

.box img{
width:100%;
border-radius:10px;
margin-top:10px;
cursor:zoom-in;
}

/* ZOOM */
#zoom{
display:none;
position:fixed;
inset:0;
background:#000;
justify-content:center;
align-items:center;
z-index:30;
}

#zoom img{
max-width:100%;
max-height:100%;
}
</style>
</head>

<body>

<header>
<div>🚗 Garage Pro</div>

<div class="actions">

<button onclick="undo()">↩</button>
<button onclick="redo()">↪</button>
<button onclick="exportPDF()">📄</button>

<button onclick="exportData()">⬇</button>
<button onclick="document.getElementById('fileInput').click()">⬆</button>

<input id="fileInput" type="file" hidden accept="application/json" onchange="importData(event)">
</div>
</header>

<div class="container">

<div class="section">
<h3>Scaffali</h3>
<input id="shelfName" placeholder="Nome scaffale">
<button onclick="addShelf()">Crea scaffale</button>
<div id="shelfView"></div>
</div>

<div class="section">
<h3>Oggetti</h3>

<input id="itemName" placeholder="Nome">
<input id="itemCat" placeholder="Categoria">

<input type="file" id="fileImg" accept="image/*">

<select id="shelfSelect"></select>
<select id="levelSelect"></select>

<button onclick="addItem()">Aggiungi oggetto</button>
</div>

<div class="section">
<h3>Inventario</h3>
<div id="items"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
<div class="box" onclick="event.stopPropagation()">
<h3 id="mTitle"></h3>
<div id="mCat"></div>
<img id="mImg" onclick="zoom(this.src)">
</div>
</div>

<!-- ZOOM -->
<div id="zoom" onclick="closeZoom()">
<img id="zoomImg">
</div>

<script>

/* ================= STATE ================= */

let state = {
scaffali: JSON.parse(localStorage.getItem("shel")) || [],
inventario: JSON.parse(localStorage.getItem("inv")) || []
};

let undoStack = [];
let redoStack = [];

const $ = id => document.getElementById(id);

/* ================= SAVE ================= */

function save(){
localStorage.setItem("shel", JSON.stringify(state.scaffali));
localStorage.setItem("inv", JSON.stringify(state.inventario));
}

/* ================= SNAPSHOT ================= */

function snapshot(){
return JSON.stringify(state);
}

function restore(s){
state = JSON.parse(s);
}

/* ================= UNDO / REDO ================= */

function pushUndo(){
undoStack.push(snapshot());
redoStack = [];
}

function undo(){
if(!undoStack.length) return;
redoStack.push(snapshot());
restore(undoStack.pop());
save();
render();
}

function redo(){
if(!redoStack.length) return;
undoStack.push(snapshot());
restore(redoStack.pop());
save();
render();
}

/* ================= IMAGE ================= */

function fileToBase64(file){
return new Promise(res=>{
const r = new FileReader();
r.onload = ()=>res(r.result);
r.readAsDataURL(file);
});
}

/* ================= SCAFFALI ================= */

function addShelf(){
const name = $("shelfName").value.trim();
if(!name) return;

pushUndo();

state.scaffali.push({
nome:name,
livelli:[{nome:"Ripiano 1"}]
});

$("shelfName").value="";
save();
render();
}

/* ================= OGGETTI ================= */

async function addItem(){

const name = $("itemName").value.trim();
if(!name) return;

pushUndo();

let img="";
const file = $("fileImg").files[0];
if(file) img = await fileToBase64(file);

state.inventario.push({
id:Date.now(),
nome:name,
categoria:$("itemCat").value,
img,
shelf:Number($("shelfSelect").value),
level:Number($("levelSelect").value)
});

$("itemName").value="";
$("itemCat").value="";
$("fileImg").value="";

save();
render();
}

/* ================= IMPORT / EXPORT ================= */

function exportData(){
const blob = new Blob([JSON.stringify(state)], {type:"application/json"});
const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = "garage_backup.json";
a.click();

URL.revokeObjectURL(url);
}

function importData(e){
const file = e.target.files[0];
if(!file) return;

const r = new FileReader();
r.onload = ev=>{
try{
pushUndo();
state = JSON.parse(ev.target.result);
save();
render();
}catch{
alert("Backup non valido");
}
};
r.readAsText(file);
}

/* ================= PDF EXPORT ================= */

function exportPDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let y = 10;

doc.setFontSize(16);
doc.text("Garage Pro - Inventario", 10, y);

y += 10;

state.scaffali.forEach((s, si)=>{

doc.setFontSize(12);
doc.text("Scaffale: " + s.nome, 10, y);
y += 6;

state.inventario
.filter(i=>i.shelf==si)
.forEach(i=>{

if(y > 280){
doc.addPage();
y = 10;
}

doc.setFontSize(10);
doc.text(`${i.nome} - ${i.categoria||"-"} - Ripiano ${i.level+1}`, 12, y);
y += 6;

});

y += 6;

});

doc.save("inventario.pdf");
}

/* ================= MODAL ================= */

function openModal(i){

$("mTitle").textContent = i.nome;
$("mCat").textContent = i.categoria || "-";

if(i.img){
$("mImg").src = i.img;
$("mImg").style.display="block";
}else{
$("mImg").style.display="none";
}

$("modal").style.display="flex";
}

function closeModal(){
$("modal").style.display="none";
}

/* ================= ZOOM ================= */

function zoom(src){
$("zoomImg").src = src;
$("zoom").style.display="flex";
}

function closeZoom(){
$("zoom").style.display="none";
}

/* ================= RENDER ================= */

function render(){

let s = $("shelfView");
s.innerHTML = "";
state.scaffali.forEach(x=>{
s.innerHTML += `<div><b>${x.nome}</b></div>`;
});

let c = $("items");
c.innerHTML = "";

state.inventario.forEach(i=>{

const div = document.createElement("div");
div.className="item";
div.onclick=()=>openModal(i);

div.innerHTML=`
${i.img ? `<img src="${i.img}">` : `<div style="width:50px;height:50px;background:#eee;border-radius:10px"></div>`}
<div>
<b>${i.nome}</b><br>
<small>${i.categoria||"-"}</small>
</div>
`;

c.appendChild(div);
});

/* selectors */
let sel = $("shelfSelect");
sel.innerHTML="";

state.scaffali.forEach((s,i)=>{
sel.innerHTML += `<option value="${i}">${s.nome}</option>`;
});

updateLevels();
}

function updateLevels(){
let i = Number($("shelfSelect").value);
let l = $("levelSelect");

l.innerHTML="";

if(!state.scaffali[i]) return;

state.scaffali[i].livelli.forEach((x,idx)=>{
l.innerHTML += `<option value="${idx}">${x.nome}</option>`;
});
}

$("shelfSelect").onchange = updateLevels;

/* INIT */
render();

</script>

</body>
</html>
