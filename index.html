<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f2f2f7;
}

header{
position:sticky;
top:0;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 12px;
border-bottom:1px solid #eee;
font-weight:700;
z-index:10;
}

.actions{
display:flex;
gap:6px;
}

.actions button{
width:auto;
padding:4px 8px;
font-size:12px;
border-radius:8px;
background:#1c1c1e;
color:#fff;
border:none;
}

.container{padding:12px;max-width:900px;margin:auto}

.section{
background:#fff;
padding:14px;
border-radius:14px;
margin-top:12px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:10px;
border:1px solid #ddd;
}

button{
background:#007aff;
color:#fff;
border:none;
font-weight:600;
}

/* SCAFFALI */
.shelf{
border:1px solid #eee;
border-radius:12px;
padding:10px;
margin-top:10px;
background:#fafafa;
}

.level{
display:flex;
gap:6px;
margin-top:6px;
align-items:center;
}

.level input{
flex:1;
border:none;
background:#fff;
padding:6px;
border-radius:8px;
font-size:12px;
}

.smallBtn{
width:auto;
padding:4px 6px;
font-size:11px;
}

/* ITEMS */
.item{
display:flex;
gap:10px;
padding:10px;
border:1px solid #eee;
border-radius:12px;
margin-top:10px;
background:#fff;
cursor:pointer;
}

.item img{
width:50px;
height:50px;
border-radius:10px;
object-fit:cover;
background:#eee;
}

/* MODAL */
#modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
}

.box{
background:#fff;
padding:14px;
border-radius:14px;
width:90%;
max-width:420px;
}

#zoom{
display:none;
position:fixed;
inset:0;
background:#000;
justify-content:center;
align-items:center;
}

#zoom img{
max-width:100%;
max-height:100%;
}
</style>
</head>

<body>

<header>
<div>🚗 Garage Pro</div>

<div class="actions">
<button onclick="undo()">↩</button>
<button onclick="redo()">↪</button>
<button onclick="exportPDF()">📄</button>
<button onclick="exportData()">⬇</button>
<button onclick="document.getElementById('fileInput').click()">⬆</button>
<input type="file" id="fileInput" hidden onchange="importData(event)">
</div>
</header>

<div class="container">

<div class="section">
<h3>Scaffali</h3>
<input id="shelfName" placeholder="Nome scaffale">
<button onclick="addShelf()">Crea scaffale</button>
<div id="shelfView"></div>
</div>

<div class="section">
<h3>Oggetti</h3>
<input id="itemName" placeholder="Nome">
<input id="itemCat" placeholder="Categoria">
<select id="shelfSelect"></select>
<select id="levelSelect"></select>
<button onclick="addItem()">Aggiungi</button>
</div>

<div class="section">
<h3>Inventario</h3>
<div id="items"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
<div class="box" onclick="event.stopPropagation()">
<h3 id="mTitle"></h3>
<div id="mCat"></div>
</div>
</div>

<!-- ZOOM -->
<div id="zoom" onclick="closeZoom()">
<img id="zoomImg">
</div>

<script>

let state = {
scaffali: JSON.parse(localStorage.getItem("shel")) || [],
inventario: JSON.parse(localStorage.getItem("inv")) || []
};

let undoStack = [];
let redoStack = [];

const $ = id => document.getElementById(id);

/* ===== SAVE ===== */
function save(){
localStorage.setItem("shel", JSON.stringify(state.scaffali));
localStorage.setItem("inv", JSON.stringify(state.inventario));
}

/* ===== SNAPSHOT ===== */
function snap(){ return JSON.stringify(state); }
function restore(s){ state = JSON.parse(s); }

function pushUndo(){
undoStack.push(snap());
redoStack=[];
}

/* ===== UNDO/REDO ===== */
function undo(){
if(!undoStack.length) return;
redoStack.push(snap());
restore(undoStack.pop());
save(); render();
}

function redo(){
if(!redoStack.length) return;
undoStack.push(snap());
restore(redoStack.pop());
save(); render();
}

/* ===== SCAFFALI ===== */

function addShelf(){
let n=$("shelfName").value.trim();
if(!n) return;

pushUndo();

state.scaffali.push({
nome:n,
livelli:[{nome:"Ripiano 1"}]
});

$("shelfName").value="";
save(); render();
}

function renameShelf(i,val){
state.scaffali[i].nome = val;
save();
}

function deleteShelf(i){
pushUndo();

state.scaffali.splice(i,1);
state.inventario = state.inventario.filter(x=>x.shelf!=i);

save(); render();
}

/* LEVELS */
function addLevel(i){
pushUndo();
state.scaffali[i].livelli.push({nome:`Ripiano ${state.scaffali[i].livelli.length+1}`});
render();
}

function renameLevel(i,l,val){
state.scaffali[i].livelli[l].nome = val;
save();
}

function deleteLevel(i,l){
pushUndo();

state.scaffali[i].livelli.splice(l,1);

state.inventario = state.inventario.filter(o=>{
if(o.shelf!=i) return true;
if(o.level==l) return false;
if(o.level>l) o.level--;
return true;
});

save(); render();
}

/* ===== ITEMS ===== */

function addItem(){
let n=$("itemName").value.trim();
if(!n) return;

pushUndo();

state.inventario.push({
id:Date.now(),
nome:n,
categoria:$("itemCat").value,
shelf:Number($("shelfSelect").value),
level:Number($("levelSelect").value)
});

$("itemName").value="";
save(); render();
}

/* ===== RENDER ===== */

function renderShelf(){
let c=$("shelfView");
c.innerHTML="";

state.scaffali.forEach((s,i)=>{

let div=document.createElement("div");
div.className="shelf";

div.innerHTML=`
<input value="${s.nome}" oninput="renameShelf(${i},this.value)">
<button class="smallBtn danger" onclick="deleteShelf(${i})">Elimina scaffale</button>
<button class="smallBtn" onclick="addLevel(${i})">+ livello</button>
`;

s.livelli.forEach((l,li)=>{
div.innerHTML+=`
<div class="level">
<input value="${l.nome}" oninput="renameLevel(${i},${li},this.value)">
<button class="smallBtn danger" onclick="deleteLevel(${i},${li})">X</button>
</div>
`;
});

c.appendChild(div);
});
}

function renderItems(){
let c=$("items");
c.innerHTML="";

state.inventario.forEach(i=>{

let d=document.createElement("div");
d.className="item";

d.innerHTML=`
<div style="width:50px;height:50px;background:#eee;border-radius:10px"></div>
<div>
<b>${i.nome}</b><br>
<small>${i.categoria||"-"}</small>
</div>
`;

c.appendChild(d);
});
}

function updateSelectors(){
let s=$("shelfSelect");
s.innerHTML="";

state.scaffali.forEach((x,i)=>{
s.innerHTML+=`<option value="${i}">${x.nome}</option>`;
});

updateLevels();
}

function updateLevels(){
let i=Number($("shelfSelect").value);
let l=$("levelSelect");

l.innerHTML="";
if(!state.scaffali[i]) return;

state.scaffali[i].livelli.forEach((x,idx)=>{
l.innerHTML+=`<option value="${idx}">${x.nome}</option>`;
});
}

$("shelfSelect").onchange=updateLevels;

/* MAIN */
function render(){
renderShelf();
renderItems();
updateSelectors();
}

render();

</script>

</body>
</html>
